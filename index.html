<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador SMT Pro - Instalação de Cabos</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        
        #container-simulador {
            position: relative;
            margin-top: 20px;
            border: 2px solid #444;
            display: inline-block;
            line-height: 0;
        }

        #fundo {
            max-width: 1000px;
            height: auto;
            display: block;
        }

        .camada-cabo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 5;
        }

        .conector {
            position: absolute;
            width: 72px; 
            height: auto;
            display: none;
            z-index: 15;
            pointer-events: none;
            transform-origin: center;
        }

        .ponto {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 0, 0.7);
            border: 2px solid gold;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            animation: pulsar 1.2s infinite;
        }

        @keyframes pulsar {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #status {
            margin-top: 15px;
            padding: 10px;
            background: #333;
            border-radius: 5px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div id="status">Iniciando simulador...</div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo" alt="Cenário">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <!-- Conectores Wago -->
        <img src="con_wago.png" id="wago-fase" class="conector">
        <img src="con_wago.png" id="wago-retorno" class="conector">
        <img src="con_wago.png" id="wago-neutro" class="conector">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>
    </div>

<script>
    const sequencia = [
        { id: 'FASE1',    max: 54, pasta: 'FASE1',    ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'} },
        
        { 
            id: 'FASE2',    
            max: 18, 
            pasta: 'FASE2',    
            ini: {t: '23%', l: '58%'}, 
            fim: {t: '81%', l: '68%'},
            wagoTop: '25%',   
            wagoLeft: '57.4%',  
            wagoRot: '90deg'   
        },

        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t: '20%', l: '61%'}, fim: {t: '75%', l: '68%'} },
        
        { 
            id: 'RETORNO2', 
            max: 24, 
            pasta: 'RETORNO2', 
            ini: {t: '17%', l: '61%'}, 
            fim: {t: '55%', l: '89%'},
            wagoTop: '18%',   
            wagoLeft: '60%',  
            wagoRot: '0deg'   
        },

        { id: 'NEUTRO1',  max: 78, pasta: 'NEUTRO1',  ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'} },
        
        { 
            id: 'NEUTRO2',  
            max: 30, 
            pasta: 'NEUTRO2',  
            ini: {t: '13%', l: '58%'}, 
            fim: {t: '55%', l: '91.3%'},
            wagoTop: '14.5%',   // Ajuste manual para o conector do Neutro
            wagoLeft: '57%',  
            wagoRot: '270deg'
        }
    ];

    let etapaAtual = 0;
    let aguardandoDestino = false;

    const elInicio = document.getElementById('ponto-inicio');
    const elFim = document.getElementById('ponto-fim');
    const txtStatus = document.getElementById('status');

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            txtStatus.innerText = "✅ INSTALAÇÃO ELÉTRICA CONCLUÍDA!";
            elInicio.style.display = 'none';
            elFim.style.display = 'none';
            return;
        }
        const dados = sequencia[etapaAtual];
        txtStatus.innerText = `Conecte o cabo: ${dados.id}`;
        elInicio.style.top = dados.ini.t;
        elInicio.style.left = dados.ini.l;
        elInicio.style.display = 'block';
        elFim.style.top = dados.fim.t;
        elFim.style.left = dados.fim.l;
        elFim.style.display = 'none';
        aguardandoDestino = false;
    }

    elInicio.onclick = (e) => {
        e.stopPropagation();
        elInicio.style.background = "#00ff00";
        elFim.style.display = 'block';
        aguardandoDestino = true;
    };

    elFim.onclick = (e) => {
        e.stopPropagation();
        if (!aguardandoDestino) return;
        elInicio.style.display = 'none';
        elFim.style.display = 'none';
        animarCabo(sequencia[etapaAtual]);
    };

    function animarCabo(cabo) {
        let frame = 0;
        const camada = document.getElementById(`camada-${cabo.id.toLowerCase()}`);
        
        const loop = setInterval(() => {
            const frameExibir = Math.min(frame, cabo.max);
            const frameString = frameExibir.toString().padStart(4, '0');
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frameString}.png')`;
            
            if (frame >= cabo.max) {
                clearInterval(loop);

                // Lógica para os conectores baseada no ID do cabo
                if (cabo.id === 'FASE2') {
                    mostrarConector('wago-fase', cabo);
                }
                if (cabo.id === 'RETORNO2') {
                    mostrarConector('wago-retorno', cabo);
                }
                if (cabo.id === 'NEUTRO2') {
                    mostrarConector('wago-neutro', cabo);
                }

                etapaAtual++;
                setTimeout(carregarEtapa, 600);
            }
            frame += 6;
        }, 70);
    }

    // Função auxiliar para exibir e posicionar o conector
    function mostrarConector(idElemento, dadosCabo) {
        const wago = document.getElementById(idElemento);
        wago.style.top = dadosCabo.wagoTop;
        wago.style.left = dadosCabo.wagoLeft;
        wago.style.transform = `translate(-50%, -50%) rotate(${dadosCabo.wagoRot})`;
        wago.style.display = 'block';
    }

    document.getElementById('container-simulador').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
        const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
        console.log(`t: '${y}%', l: '${x}%'`);
    };

    window.onload = carregarEtapa;
</script>
</body>
</html>
