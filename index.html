<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #060b13; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* TELA ENTRADA */
        #tela-entrada { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #060b13; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .btn-iniciar-lab { padding: 20px 40px; font-size: 20px; cursor: pointer; border: 2px solid #00f0ff; background: transparent; color: #00f0ff; border-radius: 50px; }

        /* SIMULADOR */
        #container-simulador { position: relative; line-height: 0; cursor: default; }
        #fundo { max-width: 1000px; }
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; }
        .tecla { position: absolute; cursor: pointer; z-index: 25; }
        
        /* PLACA CONCLUÍDO COM SCANNER */
        #placa-concluido {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; padding: 50px; background: #1a1a1a; border: 3px solid #00ff00;
            z-index: 110; display: none; text-align: center; color: #00ff00; font-size: 2.5em;
            font-weight: bold; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,0,0.3); border-radius: 15px;
        }
        #placa-concluido.show { display: block; }
        #placa-concluido::before {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 4px;
            background: #00ff00; box-shadow: 0 0 15px #00ff00;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">INICIAR LABORATÓRIO</button>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <div id="placa-concluido">CONCLUÍDO</div>
    </div>

    <script>
        let estados = { dg: false, dr: false, int: false };
        let etapaAtual = 0;

        function iniciarLaboratorio() {
            document.getElementById('tela-entrada').style.display = 'none';
            // Inicia a lógica principal
            carregarEtapa();
        }

        function carregarEtapa() {
            // Aqui entra a lógica das etapas que você já tinha
            console.log("Etapa atual: " + etapaAtual);
        }

        function toggleDispositivo(tipo) {
            estados[tipo] = !estados[tipo];
            const el = document.getElementById(`tecla-${tipo}`);
            // Lógica de troca de imagem (off/on)
            el.src = estados[tipo] ? `al_${tipo}_on.png` : `al_${tipo}_off.png`;
            
            // Verifica se montou tudo
            if (etapaAtual >= 6 && estados.dg && estados.dr && estados.int) {
                document.getElementById('placa-concluido').classList.add('show');
            }
        }
    </script>
</body>
</html>
