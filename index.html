<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #050a14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #painel-status {
            width: 90%;
            max-width: 950px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1a2a44;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #status-mensagem {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .destaque { color: #ffff00; text-shadow: 0 0 5px #ffff00; }

        .status-final {
            padding: 12px 40px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .acesa { background: #008000; box-shadow: 0 0 20px #00ff00; border: 1px solid #00ff00; }
        .apagada { background: #cc0000; box-shadow: 0 0 20px #ff0000; border: 1px solid #ff4444; }

        #container-simulador {
            position: relative;
            line-height: 0;
            user-select: none;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
        }

        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%; pointer-events: none; z-index: 5;
            opacity: 0; transition: opacity 0.3s;
        }

        #camada-lampada { 
            position: absolute; z-index: 30; opacity: 0; transition: opacity 0.2s; 
            pointer-events: none; top: 46.5%; left: 75.8%; width: 242px;
        }

        #modal-concluido {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 40%;
            background: linear-gradient(145deg, #333, #111);
            border: 4px solid #444;
            border-radius: 15px;
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .texto-concluido {
            color: #00ff00;
            font-size: 4em;
            font-weight: 900;
            text-shadow: 0 0 20px #00ff00;
        }

        .tecla { position: absolute; cursor: pointer; z-index: 25; transition: transform 0.1s; }
        .conector { position: absolute; width: 72px; display: none; z-index: 15; transform-origin: center; }

        #btn-reiniciar {
            position: absolute; bottom: 45px; left: 49%; transform: translateX(-50%);
            padding: 8px 30px; background: #cc0000; color: white; border: none;
            border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 50;
        }

        .ponto {
            position: absolute; width: 22px; height: 22px; background: rgba(255, 255, 0, 0.7);
            border: 2px solid gold; border-radius: 50%; cursor: pointer; display: none; z-index: 40;
            transform: translate(-50%, -50%); animation: pulsar 1.2s infinite;
        }

        @keyframes pulsar {
            0% { transform: translate(-50%, -50%) scale(1); }
            70% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <h1>LABORATÓRIO SMT PRO</h1>

    <audio id="som-disjuntor" src="disj.mp3"></audio>
    <audio id="som-interruptor" src="int.mp3"></audio>
    <audio id="som-conexao" src="conexao.mp3"></audio>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <img src="lamp_on.png" id="camada-lampada">

        <div id="modal-concluido">
            <div class="texto-concluido">✓ CONCLUÍDO</div>
        </div>

        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <img src="con_wago.png" id="wago-fase" class="conector">
        <img src="con_wago.png" id="wago-retorno" class="conector">
        <img src="con_wago.png" id="wago-neutro" class="conector">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>

        <button id="btn-reiniciar" onclick="reiniciarSimulador()">REINICIAR</button>
    </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let primeiroTesteFeito = false;
    let modalEmExecucao = false; 
    let etapaAtual = 0;
    let aguardandoDestino = false;

    const somDisjuntor = document.getElementById('som-disjuntor');
    const somInterruptor = document.getElementById('som-interruptor');
    const somConexao = document.getElementById('som-conexao');
    const statusTxt = document.getElementById('status-mensagem');
    const modalConcluido = document.getElementById('modal-concluido');

    const sequencia = [
        { id: 'FASE1', max: 54, pasta: 'FASE1', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'}, msg: '<span class="destaque">CONECTE A FASE.</span> CLIQUE NA REFERÊNCIA DO DR.', msgDestino: '<span class="destaque">CONECTE A FASE.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM.' },
        { id: 'NEUTRO1', max: 78, pasta: 'NEUTRO1', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'}, msg: '<span class="destaque">CONECTE O NEUTRO.</span> BARRAMENTO (N)', msgDestino: '<span class="destaque">CONECTE O NEUTRO.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM' },
        { id: 'FASE2', max: 18, pasta: 'FASE2', ini: {t: '23%', l: '58%'}, fim: {t: '81%', l: '68%'}, wagoTop: '25%', wagoLeft: '57.4%', wagoRot: '90deg', msg: '<span class="destaque">CONECTE A FASE.</span> CLIQUE NA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque">CONECTE A FASE.</span> CLIQUE NO INTERRUPTOR.' },
        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t: '20%', l: '61%'}, fim: {t: '75%', l: '68%'}, msg: '<span class="destaque">CONECTE O RETORNO.</span> CLIQUE NA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque">CONECTE O RETORNO.</span> CLIQUE NO INTERRUPTOR.' },
        { id: 'RETORNO2', max: 24, pasta: 'RETORNO2', ini: {t: '17%', l: '61%'}, fim: {t: '55%', l: '89%'}, wagoTop: '17.3%', wagoLeft: '60%', wagoRot: '0deg', msg: '<span class="destaque">CONECTE O RETORNO.</span> CLIQUE NA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque">CONECTE O RETORNO.</span> CLIQUE NA LÂMPADA.' },
        { id: 'NEUTRO2', max: 30, pasta: 'NEUTRO2', ini: {t: '13%', l: '58%'}, fim: {t: '55%', l: '91.3%'}, wagoTop: '14.5%', wagoLeft: '57%', wagoRot: '270deg', msg: '<span class="destaque">CONECTE O NEUTRO.</span> CLIQUE NA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque">CONECTE O NEUTRO.</span> CLIQUE NA LÂMPADA' }
    ];

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            statusTxt.innerHTML = '<span class="destaque">MONTAGEM CONCLUÍDA!</span> LIGUE O DG, O DR E O INTERRUPTOR.';
            document.getElementById('ponto-inicio').style.display = 'none';
            document.getElementById('ponto-fim').style.display = 'none';
            return;
        }
        const dados = sequencia[etapaAtual];
        statusTxt.innerHTML = dados.msg;
        const pIni = document.getElementById('ponto-inicio');
        pIni.style.top = dados.ini.t; pIni.style.left = dados.ini.l; pIni.style.display = 'block'; pIni.style.background = "rgba(255, 255, 0, 0.7)";
        document.getElementById('ponto-fim').style.top = dados.fim.t; document.getElementById('ponto-fim').style.left = dados.fim.l; document.getElementById('ponto-fim').style.display = 'none';
        aguardandoDestino = false;
    }

    document.getElementById('ponto-inicio').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('ponto-inicio').style.background = "#00ff00";
        document.getElementById('ponto-fim').style.display = 'block';
        aguardandoDestino = true;
        if(sequencia[etapaAtual].msgDestino) statusTxt.innerHTML = sequencia[etapaAtual].msgDestino;
    };

    document.getElementById('ponto-fim').onclick = (e) => {
        e.stopPropagation();
        if (!aguardandoDestino) return;
        document.getElementById('ponto-inicio').style.display = 'none';
        document.getElementById('ponto-fim').style.display = 'none';
        animarCabo(sequencia[etapaAtual]);
    };

    function animarCabo(cabo) {
        let frame = 0;
        const camada = document.getElementById(`camada-${cabo.id.toLowerCase()}`);
        camada.style.opacity = "1";
        const loop = setInterval(() => {
            const frameString = Math.min(frame, cabo.max).toString().padStart(4, '0');
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frameString}.png')`;
            if (frame >= cabo.max) {
                clearInterval(loop);
                somConexao.currentTime = 0; somConexao.play();
                if (cabo.wagoTop) {
                    let idWago = cabo.id.toLowerCase().includes('fase') ? 'wago-fase' : cabo.id.toLowerCase().includes('retorno') ? 'wago-retorno' : 'wago-neutro';
                    const wago = document.getElementById(idWago);
                    wago.style.top = cabo.wagoTop; wago.style.left = cabo.wagoLeft; wago.style.transform = `translate(-50%, -50%) rotate(${cabo.wagoRot})`; wago.style.display = 'block';
                }
                etapaAtual++; setTimeout(carregarEtapa, 600);
            }
            frame += 6;
        }, 70);
    }

    function toggleDispositivo(tipo) {
        estados[tipo] = !estados[tipo];
        const el = document.getElementById(`tecla-${tipo}`);
        if (tipo === 'dg' || tipo === 'dr') {
            somDisjuntor.currentTime = 0; somDisjuntor.play();
            el.src = estados[tipo] ? `al_${tipo}_on.png` : `al_${tipo}_off.png`;
        } else {
            somInterruptor.currentTime = 0; somInterruptor.play();
            el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        }
        atualizarCircuito();
    }

    function atualizarCircuito() {
        const lamp = document.getElementById('camada-lampada');
        const tudoLigado = instalacaoConcluida && estados.dg && estados.dr && estados.int;

        if (tudoLigado) {
            lamp.style.opacity = "1"; 
            primeiroTesteFeito = true;
            statusTxt.innerHTML = '<div class="status-final acesa">LÂMPADA ACESA</div>';
        } else {
            lamp.style.opacity = "0";
            if (instalacaoConcluida) {
                statusTxt.innerHTML = '<div class="status-final apagada">LÂMPADA APAGADA</div>';
                
                // NOVO CRITÉRIO: Ao apagar, se já testou a lâmpada acesa antes
                if (primeiroTesteFeito && !modalEmExecucao) {
                    modalEmExecucao = true; 
                    setTimeout(() => {
                        modalConcluido.style.display = 'flex';
                        setTimeout(() => { 
                            modalConcluido.style.display = 'none'; 
                        }, 2000);
                    }, 2000);
                } else if (!primeiroTesteFeito) {
                    statusTxt.innerHTML = '<span class="destaque">MONTAGEM CONCLUÍDA!</span> LIGUE O DG, O DR E O INTERRUPTOR.';
                }
            }
        }
    }

    function reiniciarSimulador() { location.reload(); }
    window.onload = carregarEtapa;
</script>
</body>
</html>
