<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #050a14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* TELA DE SPLASH */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050a14; display: flex; justify-content: center;
            align-items: center; z-index: 500; cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-container {
            width: 80%; max-width: 800px; background: linear-gradient(145deg, #0a1528, #050a14);
            border: 3px solid #00ffff; border-radius: 20px; padding: 60px 40px;
            text-align: center; box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .splash-titulo { color: #00ffff; font-size: 2.8em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .splash-sub { color: #00ffff; font-size: 1.5em; letter-spacing: 3px; margin-bottom: 30px; }

        /* PAINEL DE STATUS */
        #painel-status {
            width: 90%; max-width: 950px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1a2a44; border-radius: 15px; padding: 25px;
            margin-bottom: 30px; text-align: center; min-height: 80px;
            display: flex; justify-content: center; align-items: center;
        }

        #status-mensagem { font-size: 1.3em; font-weight: bold; color: #ffffff; text-transform: uppercase; }
        .cor-alerta { color: #ff0000 !important; }

        #container-simulador {
            position: relative; line-height: 0; user-select: none;
            border-radius: 10px; overflow: hidden; display: inline-block;
        }

        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%; pointer-events: none; z-index: 5;
            opacity: 0; transition: opacity 0.3s;
        }

        /* ESTILO COMUM DOS BALÕES */
        .balao {
            position: absolute; z-index: 400; background: white; color: black;
            padding: 15px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-weight: bold; font-size: 14px; line-height: 1.4;
            display: none; flex-direction: column; align-items: center;
            text-align: center; border: 2px solid #333;
        }

        .referencia-nbr { color: red; font-size: 12px; margin-top: 5px; display: block; }

        /* BALÃO 1 (Seta para baixo) */
        #balao-secao { top: 60%; left: 31.5%; width: 170px; }
        #balao-secao::after {
            content: ""; position: absolute; bottom: -12px; left: 50%;
            transform: translateX(-50%); border-width: 12px 12px 0;
            border-style: solid; border-color: white transparent transparent;
        }

        /* BALÃO 2 (Seta para a direita) */
        #balao-fase-cor { top: 38%; left: 10%; width: 180px; }
        #balao-fase-cor::after {
            content: ""; position: absolute; right: -12px; top: 50%;
            transform: translateY(-50%); border-width: 12px 0 12px 12px;
            border-style: solid; border-color: transparent transparent transparent white;
        }

        .ponto {
            position: absolute; width: 22px; height: 22px;
            background: rgba(255, 255, 0, 0.7); border: 2px solid gold;
            border-radius: 50%; cursor: pointer; display: none; z-index: 40;
            transform: translate(-50%, -50%); animation: pulsar 1.2s infinite;
        }

        @keyframes pulsar { 0% { transform: translate(-50%, -50%) scale(1); } 70% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
        .tecla { position: absolute; cursor: pointer; z-index: 25; }
        .conector { position: absolute; width: 72px; display: none; z-index: 15; transform-origin: center; }
    </style>
</head>
<body onclick="fecharTodosBaloes()">

    <div id="splash-screen" onclick="entrarNoLab()">
        <div class="splash-container">
            <div class="splash-titulo">Interruptor Simples para 1 Lâmpada</div>
            <div class="splash-sub">CIRCUITO MONOFÁSICO - 127V</div>
            <div style="color: #00ffff; margin-top: 20px;">CLIQUE PARA INICIAR</div>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador" onclick="fecharTodosBaloes()">
        <img src="ambiente.jpg" id="fundo">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <div id="balao-secao" class="balao">
            A seção mínima dos fios de iluminação é 1,5mm²
            <span class="referencia-nbr">(Item 6.2.6.1.1 da NBR-5410)</span>
        </div>

        <div id="balao-fase-cor" class="balao">
            A fase poderá ser de qualquer cor
            <span class="referencia-nbr">(Item 6.1.5.3.4 da NBR-5410)</span>
        </div>

        <img src="lamp_on.png" id="camada-lampada" style="position: absolute; z-index: 30; opacity: 0; top: 46.5%; left: 75.8%; width: 242px;">

        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <img src="con_wago.png" id="wago-fase" class="conector">
        <img src="con_wago.png" id="wago-retorno" class="conector">
        <img src="con_wago.png" id="wago-neutro" class="conector">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>
    </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let etapaAtual = 0;
    let instalacaoConcluida = false;

    const b1 = document.getElementById('balao-secao');
    const b2 = document.getElementById('balao-fase-cor');

    function entrarNoLab() { document.getElementById('splash-screen').style.display = 'none'; }

    function fecharTodosBaloes() {
        b1.style.display = 'none';
        b2.style.display = 'none';
    }

    const sequencia = [
        { id: 'FASE1', max: 54, pasta: 'FASE1', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'}, msg: 'CONECTE A FASE DA REDE.' },
        { id: 'NEUTRO1', max: 78, pasta: 'NEUTRO1', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'}, msg: 'CONECTE O NEUTRO DA REDE.' },
        { id: 'FASE2', max: 18, pasta: 'FASE2', ini: {t: '23%', l: '58%'}, fim: {t: '81%', l: '68%'}, msg: 'CONECTE A FASE AO INTERRUPTOR.' },
        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t: '20%', l: '61%'}, fim: {t: '75%', l: '68%'}, msg: 'CONECTE O RETORNO AO INTERRUPTOR.' },
        { id: 'RETORNO2', max: 24, pasta: 'RETORNO2', ini: {t: '17%', l: '61%'}, fim: {t: '55%', l: '89%'}, msg: 'CONECTE O RETORNO À LÂMPADA.' },
        { id: 'NEUTRO2', max: 30, pasta: 'NEUTRO2', ini: {t: '13%', l: '58%'}, fim: {t: '55%', l: '91.3%'}, msg: 'CONECTE O NEUTRO À LÂMPADA.' }
    ];

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            document.getElementById('status-mensagem').innerHTML = "MONTAGEM CONCLUÍDA! TESTE O CIRCUITO.";
            return;
        }
        const dados = sequencia[etapaAtual];
        document.getElementById('status-mensagem').innerHTML = dados.msg;
        const elIn = document.getElementById('ponto-inicio');
        const elFi = document.getElementById('ponto-fim');
        elIn.style.top = dados.ini.t; elIn.style.left = dados.ini.l; elIn.style.display = 'block';
        elFi.style.top = dados.fim.t; elFi.style.left = dados.fim.l; elFi.style.display = 'none';
    }

    document.getElementById('ponto-inicio').onclick = (e) => {
        e.stopPropagation();
        fecharTodosBaloes();
        document.getElementById('ponto-fim').style.display = 'block';
    };

    document.getElementById('ponto-fim').onclick = (e) => {
        e.stopPropagation();
        animarCabo(sequencia[etapaAtual]);
    };

    function animarCabo(cabo) {
        fecharTodosBaloes();
        let frame = 0;
        const camada = document.getElementById(`camada-${cabo.id.toLowerCase()}`);
        camada.style.opacity = "1";
        const loop = setInterval(() => {
            const frameString = Math.min(frame, cabo.max).toString().padStart(4, '0');
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frameString}.png')`;
            if (frame >= cabo.max) {
                clearInterval(loop);
                if (cabo.id === 'FASE1') {
                    b1.style.display = 'flex';
                    b2.style.display = 'flex';
                }
                etapaAtual++;
                carregarEtapa();
            }
            frame += 6;
        }, 70);
    }

    function toggleDispositivo(tipo) {
        estados[tipo] = !estados[tipo];
        const el = document.getElementById(`tecla-${tipo}`);
        if (tipo === 'dg') el.src = estados.dg ? 'al_dg_on.png' : 'al_dg_off.png';
        if (tipo === 'dr') el.src = estados.dr ? 'al_dr_on.png' : 'al_dr_off.png';
        if (tipo === 'int') el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        
        const lamp = document.getElementById('camada-lampada');
        lamp.style.opacity = (instalacaoConcluida && estados.dg && estados.dr && estados.int) ? "1" : "0";
    }

    window.onload = carregarEtapa;
</script>
</body>
</html>
