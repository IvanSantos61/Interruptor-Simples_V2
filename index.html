<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador SMT Pro - Teste de Carga</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        
        #container-simulador {
            position: relative;
            border: 2px solid #444;
            display: inline-block;
            line-height: 0;
            user-select: none;
        }

        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
        }

        #camada-lampada { 
            position: absolute;
            z-index: 30; 
            opacity: 0; 
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
            /* Coordenadas que você confirmou estarem corretas */
            top: 10%; left: 45%; width: 120px; 
        }

        .tecla {
            position: absolute;
            cursor: pointer;
            z-index: 25;
            transition: transform 0.1s;
        }
        .tecla:active { transform: scale(0.95); }

        .conector {
            position: absolute; width: 72px; display: none; z-index: 15;
            pointer-events: none; transform-origin: center;
        }

        .ponto {
            position: absolute; width: 22px; height: 22px;
            background: rgba(255, 255, 0, 0.7); border: 2px solid gold;
            border-radius: 50%; cursor: pointer; display: none; z-index: 40;
            transform: translate(-50%, -50%); animation: pulsar 1.2s infinite;
        }

        @keyframes pulsar {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #painel-controle { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }

        #status {
            padding: 15px; background: #222;
            border: 1px solid #444; border-radius: 8px; 
            font-weight: bold; color: #ffd700; width: 600px; text-align: center;
        }

        .btn-reiniciar {
            padding: 12px 20px; cursor: pointer; background: #cc0000; color: white; 
            border: none; border-radius: 5px; font-weight: bold; transition: 0.3s;
        }
        .btn-reiniciar:hover { background: #ff0000; }
    </style>
</head>
<body>

    <div id="painel-controle">
        <button class="btn-reiniciar" onclick="reiniciarSimulador()">🔄 REINICIAR</button>
        <div id="status">
            <div id="status-titulo">Iniciando Simulador...</div>
            <div id="status-mensagem" style="font-weight: normal; font-size: 0.85em; color: #aaa; margin-top: 4px;"></div>
        </div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo" alt="Cenário">
        
        <!-- Camadas de Cabos -->
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <!-- Lâmpada Acesa -->
        <img src="lamp_on.png" id="camada-lampada" alt="Lâmpada Acesa">

        <!-- Dispositivos Interativos -->
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <!-- Conectores -->
        <img src="con_wago.png" id="wago-fase" class="conector">
        <img src="con_wago.png" id="wago-retorno" class="conector">
        <img src="con_wago.png" id="wago-neutro" class="conector">

        <!-- Pontos de Clique -->
        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>
    </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let etapaAtual = 0;
    let aguardandoDestino = false;

    // Sequência de montagem com campos para suas futuras mensagens
    const sequencia = [
        { id: 'FASE1', max: 54, pasta: 'FASE1', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'}, msg: "Aguardando frase para FASE 1..." },
        { id: 'FASE2', max: 18, pasta: 'FASE2', ini: {t: '23%', l: '58%'}, fim: {t: '81%', l: '68%'}, wagoTop: '25%', wagoLeft: '57.4%', wagoRot: '90deg', msg: "Aguardando frase para FASE 2..." },
        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t: '20%', l: '61%'}, fim: {t: '75%', l: '68%'}, msg: "Aguardando frase para RETORNO 1..." },
        { id: 'RETORNO2', max: 24, pasta: 'RETORNO2', ini: {t: '17%', l: '61%'}, fim: {t: '55%', l: '89%'}, wagoTop: '18%', wagoLeft: '60%', wagoRot: '0deg', msg: "Aguardando frase para RETORNO 2..." },
        { id: 'NEUTRO1', max: 78, pasta: 'NEUTRO1', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'}, msg: "Aguardando frase para NEUTRO 1..." },
        { id: 'NEUTRO2', max: 30, pasta: 'NEUTRO2', ini: {t: '13%', l: '58%'}, fim: {t: '55%', l: '91.3%'}, wagoTop: '14.5%', wagoLeft: '57%', wagoRot: '270deg', msg: "Aguardando frase para NEUTRO 2..." }
    ];

    const elInicio = document.getElementById('ponto-inicio');
    const elFim = document.getElementById('ponto-fim');
    const statusTitulo = document.getElementById('status-titulo');
    const statusMsg = document.getElementById('status-mensagem');

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            statusTitulo.innerText = "✅ MONTAGEM CONCLUÍDA";
            statusMsg.innerText = "Acione o DG, o DR e o Interruptor para testar a carga.";
            elInicio.style.display = 'none';
            elFim.style.display = 'none';
            atualizarCircuito();
            return;
        }

        const dados = sequencia[etapaAtual];
        statusTitulo.innerText = `Conectando: ${dados.id}`;
        statusMsg.innerText = dados.msg;

        elInicio.style.top = dados.ini.t;
        elInicio.style.left = dados.ini.l;
        elInicio.style.display = 'block';
        elInicio.style.background = "rgba(255, 255, 0, 0.7)";
        
        elFim.style.top = dados.fim.t;
        elFim.style.left = dados.fim.l;
        elFim.style.display = 'none';
        
        aguardandoDestino = false;
    }

    elInicio.onclick = (e) => {
        e.stopPropagation();
        elInicio.style.background = "#00ff00";
        elFim.style.display = 'block';
        aguardandoDestino = true;
    };

    elFim.onclick = (e) => {
        e.stopPropagation();
        if (!aguardandoDestino) return;
        elInicio.style.display = 'none';
        elFim.style.display = 'none';
        animarCabo(sequencia[etapaAtual]);
    };

    function animarCabo(cabo) {
        let frame = 0;
        const camada = document.getElementById(`camada-${cabo.id.toLowerCase()}`);
        camada.style.opacity = "1";
        
        const loop = setInterval(() => {
            const frameExibir = Math.min(frame, cabo.max);
            const frameString = frameExibir.toString().padStart(4, '0');
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frameString}.png')`;
            
            if (frame >= cabo.max) {
                clearInterval(loop);
                if (cabo.wagoTop) {
                    let idWago = cabo.id.toLowerCase().includes('fase') ? 'wago-fase' : 
                                 cabo.id.toLowerCase().includes('retorno') ? 'wago-retorno' : 'wago-neutro';
                    mostrarConector(idWago, cabo);
                }
                etapaAtual++;
                setTimeout(carregarEtapa, 600);
            }
            frame += 6;
        }, 70);
    }

    function mostrarConector(idElemento, dadosCabo) {
        const wago = document.getElementById(idElemento);
        if (wago) {
            wago.style.top = dadosCabo.wagoTop;
            wago.style.left = dadosCabo.wagoLeft;
            wago.style.transform = `translate(-50%, -50%) rotate(${dadosCabo.wagoRot})`;
            wago.style.display = 'block';
        }
    }

    function toggleDispositivo(tipo) {
        estados[tipo] = !estados[tipo];
        const el = document.getElementById(`tecla-${tipo}`);
        
        if (tipo === 'dg') el.src = estados.dg ? 'al_dg_on.png' : 'al_dg_off.png';
        if (tipo === 'dr') el.src = estados.dr ? 'al_dr_on.png' : 'al_dr_off.png';
        if (tipo === 'int') el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        
        atualizarCircuito();
    }

    function atualizarCircuito() {
        const lamp = document.getElementById('camada-lampada');
        if (!lamp) return;

        if (instalacaoConcluida && estados.dg && estados.dr && estados.int) {
            lamp.style.opacity = "1";
            statusTitulo.innerText = "💡 LÂMPADA ACESA!";
        } else {
            lamp.style.opacity = "0";
            if (instalacaoConcluida) {
                if (!estados.dg) statusTitulo.innerText = "❌ DISJUNTOR GERAL DESLIGADO";
                else if (!estados.dr) statusTitulo.innerText = "❌ DISPOSITIVO DR DESLIGADO";
                else if (!estados.int) statusTitulo.innerText = "⚪ LIGUE O INTERRUPTOR";
            }
        }
    }

    function reiniciarSimulador() {
        etapaAtual = 0;
        instalacaoConcluida = false;
        aguardandoDestino = false;
        estados = { dg: false, dr: false, int: false };

        // Resetar Teclas
        document.getElementById('tecla-dg').src = 'al_dg_off.png';
        document.getElementById('tecla-dr').src = 'al_dr_off.png';
        document.getElementById('tecla-int').src = 'tec_int_off.png';

        // Resetar Cabos
        const ids = ['fase1', 'fase2', 'retorno1', 'retorno2', 'neutro1', 'neutro2'];
        ids.forEach(id => {
            const el = document.getElementById(`camada-${id}`);
            if (el) {
                el.style.opacity = "0";
                el.style.backgroundImage = "none";
            }
        });

        // Resetar Conectores e Lâmpada
        ['wago-fase', 'wago-retorno', 'wago-neutro'].forEach(w => {
            const el = document.getElementById(w);
            if (el) el.style.display = 'none';
        });

        document.getElementById('camada-lampada').style.opacity = "0";
        
        carregarEtapa();
    }

    window.onload = carregarEtapa;
</script>
</body>
</html>
