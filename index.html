<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro</title>
    <style>
        /* Cole aqui todo o seu CSS original da Parte 1 */
        body { font-family: 'Segoe UI', sans-serif; background: #060b13; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #container-simulador { position: relative; display: inline-block; cursor: default; }
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: 100% 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        .ponto { position: absolute; width: 14px; height: 14px; border: 2px solid #ffffff; border-radius: 50%; cursor: pointer; display: none; z-index: 150; transform: translate(-50%, -50%); }
        .tecla { position: absolute; cursor: pointer; z-index: 100; }
        #painel-equipamentos { position: absolute; top: 22%; left: 66.3%; z-index: 90; display: none; }
        /* Adicione o restante do seu CSS aqui */
    </style>
</head>
<body onclick="fecharBalao()">

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 1<br>LÂMPADA</h1>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador" onclick="fecharBalao()">
        <img src="ambiente.jpg" id="fundo">
        
        <div class="hotspot" style="top: 13%; left: 11.5%; width: 40px; height: 150px;" data-name="DISJUNTOR GERAL"></div>
        <div class="hotspot" style="top: 12.5%; left: 19.5%; width: 88px; height: 160px;" data-name="DISPOSITIVO DR"></div>
        <div class="hotspot" style="top: 61%; left: 67%; width: 98px; height: 190px;" data-name="INTERRUPTOR SIMPLES"></div>
        <div class="hotspot" style="top: 74%; left: 86%; width: 110px; height: 115px;" data-name="LÂMPADA LED"></div>

        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>

        <img src="lamp_on.png" id="camada-lampada" style="position:absolute; z-index: 30; opacity: 0; top: 46.5%; left: 75.8%; width: 242px;">
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>
    </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let etapaAtual = 0;
    let aguardandoDestino = false;

    // SEQUÊNCIA ATUALIZADA COM SEUS VALORES DE MAX (FRAMES)
    const sequencia = [
        { id: 'FASE1', max: 63, pasta: 'FASE1', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'} },
        { id: 'NEUTRO1', max: 79, pasta: 'NEUTRO1', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'} },
        { id: 'FASE2', max: 20, pasta: 'FASE2', ini: {t: '32%', l: '58.5%'}, fim: {t: '81%', l: '68%'} },
        { id: 'RETORNO1', max: 50, pasta: 'RETORNO1', ini: {t: '19.3%', l: '63%'}, fim: {t: '75%', l: '68%'} },
        { id: 'NEUTRO2', max: 20, pasta: 'NEUTRO2', ini: {t: '8%', l: '58%'}, fim: {t: '55%', l: '91.3%'} }
    ];

    function iniciarLaboratorio() { 
        document.getElementById('tela-entrada').style.visibility = 'hidden'; 
        carregarEtapa(); 
    }

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            document.getElementById('status-mensagem').innerText = 'FIAÇÃO CONCLUÍDA! LIGUE OS DISPOSITIVOS.';
            return;
        }
        let s = sequencia[etapaAtual];
        let elInicio = document.getElementById('ponto-inicio');
        let elFim = document.getElementById('ponto-fim');
        
        elInicio.style.display = 'block';
        elInicio.style.top = s.ini.t; elInicio.style.left = s.ini.l;
        elInicio.onclick = () => { elFim.style.display = 'block'; elFim.style.top = s.fim.t; elFim.style.left = s.fim.l; aguardandoDestino = true; };
        elFim.onclick = () => { if(aguardandoDestino) animarCabo(s); };
    }

    function animarCabo(cabo) {
        aguardandoDestino = false;
        let frame = 1;
        let camada = document.getElementById('camada-' + cabo.id.toLowerCase());
        camada.style.opacity = "1";
        let loop = setInterval(() => {
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frame.toString().padStart(4, '0')}.png')`;
            if (frame >= cabo.max) { clearInterval(loop); etapaAtual++; carregarEtapa(); }
            frame++;
        }, 30);
    }

    function toggleDispositivo(tipo) {
        estados[tipo] = !estados[tipo];
        let el = document.getElementById('tecla-' + tipo);
        el.src = estados[tipo] ? `al_${tipo}_on.png` : `al_${tipo}_off.png`;
        if (instalacaoConcluida && estados.dg && estados.dr && estados.int) {
            document.getElementById('camada-lampada').style.opacity = "1";
        } else {
            document.getElementById('camada-lampada').style.opacity = "0";
        }
    }
    
    function fecharBalao() {}
</script>
</body>
</html>
