<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Corrigido</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #060b13; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; }
        h1 { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; text-transform: uppercase; }
        #tela-entrada { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #060b13; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        
        #container-simulador { position: relative; line-height: 0; user-select: none; border-radius: 10px; overflow: hidden; display: inline-block; }
        #fundo { max-width: 1000px; height: auto; display: block; }
        
        /* Camadas dos cabos corrigidas */
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; background-size: 100% 100%; }
        
        #painel-status { width: 90%; max-width: 950px; background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44; border-radius: 15px; padding: 25px; margin-bottom: 30px; text-align: center; }
        .tecla { position: absolute; cursor: pointer; z-index: 125; }
        .conector { position: absolute; display: none; z-index: 15; pointer-events: auto; }
        .balao-base { position: absolute; z-index: 400; background: white; color: black; padding: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body onclick="fecharBalao()">

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <h1 class="titulo-entrada">LABORATÓRIO SMT PRO</h1>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

<div id="container-simulador" onclick="fecharBalao()">
        <img src="ambiente.jpg" id="fundo">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>
        <div class="hotspot" style="top: 13%; left: 11.5%; width: 40px; height: 150px;" data-name="DISJUNTOR GERAL"></div>
        <img src="lamp_on.png" id="camada-lampada">
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 66%; width: 53px; z-index: 100; pointer-events: auto; cursor: help;" onclick="toggleDispositivo('int')">

        </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let etapaAtual = 0;

    function iniciarLaboratorio() { 
        document.getElementById('tela-entrada').style.opacity = '0'; 
        setTimeout(() => { document.getElementById('tela-entrada').style.visibility = 'hidden'; carregarEtapa(); }, 500); 
    }

    const sequencia = [
        { id: 'FASE1', max: 63, pasta: 'FASE1' },
        { id: 'NEUTRO1', max: 79, pasta: 'NEUTRO1' },
        { id: 'FASE2', max: 20, pasta: 'FASE2' },
        { id: 'RETORNO1', max: 50, pasta: 'RETORNO1' },
        { id: 'NEUTRO2', max: 20, pasta: 'NEUTRO2' }
    ];

    function animarCabo(cabo) {
        const camada = document.getElementById(`camada-${cabo.id.toLowerCase()}`);
        if (!camada) { console.error("Elemento não encontrado: camada-" + cabo.id.toLowerCase()); return; }
        
        camada.style.opacity = "1";
        let frame = 1;
        const loop = setInterval(() => {
            if (frame > cabo.max) {
                clearInterval(loop);
                etapaAtual++;
                carregarEtapa();
                return;
            }
            const frameString = frame.toString().padStart(4, '0');
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frameString}.png')`;
            frame++;
        }, 25);
    }

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            document.getElementById('status-mensagem').innerText = 'FIAÇÃO CONCLUÍDA! LIGUE OS DISPOSITIVOS.';
            return;
        }
        // Lógica de cliques simplificada para teste
        console.log("Etapa atual: " + sequencia[etapaAtual].id);
        // Exemplo: chamando direto para testar se a animação ocorre
        animarCabo(sequencia[etapaAtual]);
    }
</script>
</body>
</html>
