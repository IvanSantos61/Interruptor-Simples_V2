<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Versão Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #060b13; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- TOOLTIP DINÂMICO --- */
        #tooltip-lab {
            position: fixed;
            padding: 8px 12px;
            background: rgba(0, 20, 40, 0.95);
            color: #00f0ff;
            border: 1px solid #00f0ff;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            z-index: 9999;
            display: none;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        /* --- ÁREAS SENSÍVEIS (HOTSPOTS) --- */
        .hotspot {
            position: absolute;
            z-index: 80;
            cursor: help;
            border: 1px solid red; /* Mantenha para ajuste, remova depois */
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #060b13; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .moldura-entrada {
            width: 80%; max-width: 900px; height: 70%; max-height: 450px;
            border: 3px solid #00f0ff; border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .intro-entrada { color: #008b8b; font-size: 55px; font-weight: 400; text-transform: uppercase; margin-bottom: 10px; }
        .titulo-entrada { color: #00f0ff; font-size: 38px; text-transform: uppercase; margin-bottom: 25px; }
        .subtitulo-entrada { color: #00f0ff; font-size: 24px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; }
        .creditos-entrada { color: #445566; font-size: 15px; margin-bottom: 50px; }

        .btn-iniciar-lab {
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px;
            color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase;
            padding: 12px 35px; cursor: pointer; animation: pulsarBotao 1.5s infinite;
        }
        @keyframes pulsarBotao { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- INTERFACE --- */
        #painel-status {
            width: 90%; max-width: 950px;
            background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44;
            border-radius: 15px; padding: 25px; margin-bottom: 30px;
            text-align: center; min-height: 80px; display: flex; justify-content: center; align-items: center;
        }

        #status-mensagem { font-family: 'Arial Narrow', Arial, sans-serif; font-size: 1.3em; font-weight: bold; color: #ffffff; text-transform: uppercase; }

        #container-simulador { position: relative; line-height: 0; user-select: none; border-radius: 10px; overflow: hidden; display: inline-block; }
        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; background-size: 100% 100%; }
        #camada-lampada { position: absolute; z-index: 30; opacity: 0; transition: opacity 0.2s; top: 46.5%; left: 75.8%; width: 242px; }

        .tecla { position: absolute; cursor: pointer; z-index: 90; }
        .conector { position: absolute; display: none; z-index: 15; cursor: help; width: 65px; }

        /* --- BALÕES DE AJUDA --- */
        .balao-base {
            position: absolute; z-index: 400; background: white; color: black;
            padding: 15px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-weight: bold; font-size: 14px; display: none;
            flex-direction: column; align-items: center; text-align: center; border: 2px solid #333; width: 220px;
        }
        .referencia-nbr { color: red; font-size: 11px; margin-top: 5px; display: block; }

        .ponto { position: absolute; width: 14px; height: 14px; border: 2px solid #ffffff; border-radius: 50%; cursor: pointer; display: none; z-index: 40; transform: translate(-50%, -50%); animation: pulsar 1.2s infinite; }
        @keyframes pulsar { 0% { scale: 1; } 50% { scale: 1.3; } 100% { scale: 1; } }
        
        .btn-acao { position: absolute; padding: 8px 25px; width: 130px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; z-index: 100; }
        #btn-ajuda { background: #1a2a44; border: 1px solid #00f0ff; top: 79%; left: 15%; }
        #btn-reiniciar { background: #cc0000; top: 87%; left: 15%; }
    </style>
</head>
<body onclick="fecharBalao()">

    <div id="tooltip-lab"></div>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 1<br>LÂMPADA</h1>
            <h2 class="subtitulo-entrada">CIRCUITO MONOFÁSICO - 127V</h2>
            <div class="creditos-entrada">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</div>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
         
        <div id="camada-fase1" class="camada-cabo" style="background-image: url('fase1.png');"></div>
        <div id="camada-fase2" class="camada-cabo" style="background-image: url('fase2.png');"></div>
        <div id="camada-retorno1" class="camada-cabo" style="background-image: url('retorno1.png');"></div>
        <div id="camada-retorno2" class="camada-cabo" style="background-image: url('retorno2.png');"></div>
        <div id="camada-neutro1" class="camada-cabo" style="background-image: url('neutro1.png');"></div>
        <div id="camada-neutro2" class="camada-cabo" style="background-image: url('neutro2.png');"></div>

        <div class="hotspot" style="top: 10%; left: 5%; width: 50px; height: 180px;" onmousemove="mapaMouse(event, 'BARRA DE ATERRAMENTO')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 10%; left: 15%; width: 45px; height: 160px;" onmousemove="mapaMouse(event, 'DG (DISJUNTOR GERAL)')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 10%; left: 22%; width: 40px; height: 160px;" onmousemove="mapaMouse(event, 'DPS')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 10%; left: 28%; width: 70px; height: 160px;" onmousemove="mapaMouse(event, 'DR (DISPOSITIVO DR)')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 10%; left: 38%; width: 100px; height: 160px;" onmousemove="mapaMouse(event, 'DISJUNTORES DE CIRCUITO')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 10%; left: 50%; width: 50px; height: 180px;" onmousemove="mapaMouse(event, 'BARRA DE NEUTRO')" onmouseout="mapaSair()"></div>

        <div id="balao-ajuda" class="balao-base">
            <span id="texto-ajuda"></span>
            <span class="referencia-nbr">NBR-5410</span>
        </div>

        <img src="lamp_on.png" id="camada-lampada">
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggle('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggle('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggle('int')">

        <img src="con_wago.png" id="wago-fase" class="conector" style="top: 26%; left: 57.4%;" onclick="abrirAjuda(event, 'Cabo Fase: Cor Preta ou Marrom.')">
        <img src="con_wago.png" id="wago-retorno" class="conector" style="top: 17.7%; left: 59.6%;" onclick="abrirAjuda(event, 'Cabo Retorno: Geralmente Branco ou Vermelho.')">
        <img src="con_wago.png" id="wago-neutro" class="conector" style="top: 14%; left: 57%;" onclick="abrirAjuda(event, 'Cabo Neutro: Cor obrigatória Azul Claro.')">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>

        <button id="btn-ajuda" class="btn-acao" onclick="event.stopPropagation(); alert('Clique nos conectores para ver detalhes técnicos.')">AJUDA</button>
        <button id="btn-reiniciar" class="btn-acao" onclick="location.reload()">REINICIAR</button>
    </div>

<script>
    let etapaAtual = 0;
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;

    const ttLab = document.getElementById('tooltip-lab');
    const balao = document.getElementById('balao-ajuda');

    function mapaMouse(e, nome) {
        ttLab.innerHTML = nome;
        ttLab.style.display = 'block';
        ttLab.style.left = (e.clientX + 10) + 'px';
        ttLab.style.top = (e.clientY + 10) + 'px';
    }
    function mapaSair() { ttLab.style.display = 'none'; }

    function abrirAjuda(e, texto) {
        e.stopPropagation();
        balao.style.display = 'flex';
        balao.style.left = (e.pageX - 110) + 'px';
        balao.style.top = (e.pageY - 120) + 'px';
        document.getElementById('texto-ajuda').innerText = texto;
    }
    function fecharBalao() { balao.style.display = 'none'; }

    function iniciarLaboratorio() { 
        document.getElementById('tela-entrada').style.opacity = '0'; 
        setTimeout(() => { 
            document.getElementById('tela-entrada').style.visibility = 'hidden'; 
            carregarEtapa(); 
        }, 500); 
    }

    const sequencia = [
        { id: 'fase1', msg: 'Conecte a Fase na entrada do DG', ini: {t:'38%', l:'27%'}, fim: {t:'23%', l:'56.5%'} },
        { id: 'fase2', msg: 'Conecte a saída do DR ao Interruptor', ini: {t:'28%', l:'28%'}, fim: {t:'70%', l:'70%'} },
        { id: 'retorno1', msg: 'Conecte o Retorno do Interruptor ao Wago', ini: {t:'73%', l:'75%'}, fim: {t:'18%', l:'60%'} },
        { id: 'retorno2', msg: 'Leve o Retorno até a Lâmpada', ini: {t:'18%', l:'61%'}, fim: {t:'48%', l:'78%'} },
        { id: 'neutro1', msg: 'Conecte o Neutro da Rede ao Barramento', ini: {t:'35%', l:'44%'}, fim: {t:'14%', l:'56%'} },
        { id: 'neutro2', msg: 'Conecte o Neutro à Lâmpada', ini: {t:'14%', l:'58%'}, fim: {t:'48%', l:'82%'} }
    ];

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            document.getElementById('status-mensagem').innerHTML = "INSTALAÇÃO CONCLUÍDA! LIGUE OS DISPOSITIVOS.";
            return;
        }
        const d = sequencia[etapaAtual];
        document.getElementById('status-mensagem').innerHTML = d.msg;
        const p1 = document.getElementById('ponto-inicio');
        const p2 = document.getElementById('ponto-fim');
        p1.style.top=d.ini.t; p1.style.left=d.ini.l; p1.style.display='block';
        p2.style.top=d.fim.t; p2.style.left=d.fim.l; p2.style.display='block'; p2.style.opacity='0';

        p1.onclick = () => p2.style.opacity='1';
        p2.onclick = () => {
            document.getElementById('camada-'+d.id).style.opacity='1';
            if(d.id.includes('fase')) document.getElementById('wago-fase').style.display='block';
            if(d.id.includes('retorno')) document.getElementById('wago-retorno').style.display='block';
            if(d.id.includes('neutro')) document.getElementById('wago-neutro').style.display='block';
            etapaAtual++;
            p1.style.display='none'; p2.style.display='none';
            carregarEtapa();
        };
    }

    function toggle(t) {
        estados[t] = !estados[t];
        const el = document.getElementById('tecla-'+t);
        if(t === 'int') el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        else el.src = estados[t] ? `al_${t}_on.png` : `al_${t}_off.png`;
        
        const ligada = instalacaoConcluida && estados.dg && estados.dr && estados.int;
        document.getElementById('camada-lampada').style.opacity = ligada ? "1" : "0";
    }
</script>
</body>
</html>
