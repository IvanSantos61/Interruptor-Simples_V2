<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        /* MANTENDO SEU CSS ORIGINAL E ADICIONANDO APENAS O NOVO BALÃO */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050a14; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; }
        h1 { color: #00ffff; text-shadow: 0 0 10px #00ffff; font-size: 2.5em; margin-bottom: 20px; text-transform: uppercase; }
        #painel-status { width: 90%; max-width: 950px; background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44; border-radius: 15px; padding: 25px; margin-bottom: 30px; text-align: center; display: flex; justify-content: center; align-items: center; }
        #status-mensagem { font-size: 1.3em; font-weight: bold; text-transform: uppercase; }
        #container-simulador { position: relative; line-height: 0; user-select: none; border-radius: 10px; overflow: hidden; display: inline-block; }
        #fundo { max-width: 1000px; height: auto; display: block; }
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: 100% 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        
        /* ESTILO DOS BALÕES */
        .balao-alerta {
            position: absolute; z-index: 400; background: white; color: black;
            padding: 15px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-weight: bold; font-size: 14px; line-height: 1.4;
            display: none; flex-direction: column; align-items: center;
            text-align: center; border: 2px solid #333;
        }

        /* BALÃO 1 - SETA BAIXO */
        #balao-secao { top: 60%; left: 31.5%; width: 170px; }
        #balao-secao::after { content: ""; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 12px 0; border-style: solid; border-color: white transparent transparent; }

        /* BALÃO 2 - SETA DIREITA (O NOVO) */
        #balao-fase-cor { top: 12%; left: 10%; width: 180px; } 
        #balao-fase-cor::after { content: ""; position: absolute; right: -12px; top: 50%; transform: translateY(-50%); border-width: 12px 0 12px 12px; border-style: solid; border-color: transparent transparent transparent white; }

        .referencia-nbr { color: red; font-size: 12px; margin-top: 5px; display: block; }
        
        /* OUTROS ELEMENTOS */
        .ponto { position: absolute; width: 22px; height: 22px; background: rgba(255, 255, 0, 0.7); border: 2px solid gold; border-radius: 50%; cursor: pointer; display: none; z-index: 40; transform: translate(-50%, -50%); animation: pulsar 1.2s infinite; }
        @keyframes pulsar { 0% { transform: translate(-50%, -50%) scale(1); } 70% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
        .tecla { position: absolute; cursor: pointer; z-index: 25; }
        .conector { position: absolute; width: 72px; display: none; z-index: 15; transform-origin: center; }
    </style>
</head>
<body onclick="fecharBaloes()">

    <h1>LABORATÓRIO SMT PRO</h1>

    <audio id="som-conexao" src="conexao.mp3"></audio>

    <div id="painel-status">
        <div id="status-mensagem">CONECTE A FASE DA REDE</div>
    </div>

    <div id="container-simulador" onclick="fecharBaloes()">
        <img src="ambiente.jpg" id="fundo">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="balao-secao" class="balao-alerta">
            A seção mínima dos fios de iluminação é 1,5mm²
            <span class="referencia-nbr">(Item 6.2.6.1.1 da NBR-5410)</span>
        </div>

        <div id="balao-fase-cor" class="balao-alerta">
            A fase poderá ser de qualquer cor
            <span class="referencia-nbr">(Item 6.1.5.3.4 da NBR-5410)</span>
        </div>

        <div id="ponto-inicio" class="ponto" style="top: 38%; left: 27%; display: block;"></div>
        <div id="ponto-fim" class="ponto" style="top: 23%; left: 56.5%; display: none;"></div>
    </div>

<script>
    const b1 = document.getElementById('balao-secao');
    const b2 = document.getElementById('balao-fase-cor');

    function fecharBaloes() {
        b1.style.display = 'none';
        b2.style.display = 'none';
    }

    // Lógica simplificada apenas para demonstrar o disparo dos balões no seu código
    document.getElementById('ponto-inicio').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('ponto-fim').style.display = 'block';
    };

    document.getElementById('ponto-fim').onclick = (e) => {
        e.stopPropagation();
        // Aqui simula o final da sua função animarCabo para a FASE1
        let camada = document.getElementById('camada-fase1');
        camada.style.opacity = "1";
        camada.style.backgroundImage = "url('FASE1/quadro0054.png')"; // Quadro final
        
        document.getElementById('som-conexao').play();
        
        // DISPARO DOS DOIS BALÕES
        b1.style.display = 'flex';
        b2.style.display = 'flex';
    };
</script>
</body>
</html>
