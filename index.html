<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Versão Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* [INÍCIO DO SEU CSS ORIGINAL] */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #060b13; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; overflow-x: hidden; }
        h1 { color: #00f0ff; text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff; font-size: 2.5em; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        #tela-entrada { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #060b13; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .moldura-entrada { width: 80%; max-width: 900px; height: 70%; max-height: 450px; border: 3px solid #00f0ff; border-radius: 25px; box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .intro-entrada { color: #008b8b; font-size: 55px; font-weight: 400; line-height: 1.1; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 139, 139, 0.5); margin: 0 0 10px 0; }
        .titulo-entrada { color: #00f0ff; font-size: 38px; font-weight: 400; line-height: 1.2; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin: 0 0 25px 0; }
        .subtitulo-entrada { color: #00f0ff; font-size: 24px; font-weight: 450; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 50px 0; }
        .creditos-entrada { color: #445566; font-size: 15px; font-weight: 500; margin-bottom: 50px; }
        .btn-iniciar-lab { background: transparent; border: 2px solid #00f0ff; border-radius: 50px; color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase; padding: 12px 35px; cursor: pointer; letter-spacing: 1px; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); transition: all 0.3s ease; animation: pulsarBotao 1.5s infinite; }
        @keyframes pulsarBotao { 0% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); } 50% { opacity: 1; box-shadow: 0 0 25px rgba(0,240,255,0.6); } 100% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); } }
        .btn-iniciar-lab:hover { background: #00f0ff; color: #060b13; }
        #painel-status { width: 90%; max-width: 950px; background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44; border-radius: 15px; padding: 25px; margin-bottom: 30px; text-align: center; min-height: 80px; display: flex; justify-content: center; align-items: center; }
        #status-mensagem { font-family: 'Arial Narrow', Arial, sans-serif; font-size: 1.3em; font-weight: bold; color: #ffffff; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s ease; }
        #container-simulador { position: relative; line-height: 0; user-select: none; border-radius: 10px; overflow: hidden; display: inline-block; }
        #fundo { max-width: 1000px; height: auto; display: block; }
        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: 100% 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        #camada-lampada { position: absolute; z-index: 30; opacity: 0; transition: opacity 0.2s; pointer-events: auto; top: 46.5%; left: 75.8%; width: 242px; cursor: help; }
        .tecla { position: absolute; cursor: pointer; z-index: 90; transition: transform 0.1s; }
        .tecla:active { transform: scale(0.95); }
        .conector { position: absolute; display: none; z-index: 15; pointer-events: auto; transform-origin: center; cursor: help; }
        #painel-equipamentos { position: absolute; top: 22%; left: 66.3%; width: 190px; background: rgba(5, 10, 20, 0.95); border: 2px solid #00f0ff; border-radius: 12px; padding: 15px; box-shadow: 0 0 25px rgba(0, 240, 255, 0.3); font-family: 'Orbitron', sans-serif; z-index: 95; display: none; flex-direction: column; gap: 10px; }
        .titulo-painel-equip { font-size: 11px; color: #00f0ff; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(0, 240, 255, 0.3); padding-bottom: 6px; margin-bottom: 4px; letter-spacing: 1px; }
        .item-equip-moldura { background: rgba(0, 255, 255, 0.05); border: 1px solid #00f0ff; border-radius: 5px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; }
        .simbolo-ligado { color: #00ff00; text-shadow: 0 0 8px #00ff00; }
        .simbolo-desligado { color: #ff0000; text-shadow: 0 0 8px #ff0000; }
        .balao-base { position: absolute; z-index: 400; background: white; color: black; padding: 15px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); font-weight: bold; font-size: 15px; line-height: 1.3; display: none; flex-direction: column; align-items: center; text-align: center; border: 2px solid #333; }
        .referencia-nbr { color: red; font-size: 11px; font-weight: bold; margin-top: 10px; display: block; border-top: 1px solid #ccc; padding-top: 5px; width: 100%; }
        .btn-acao { position: absolute; padding: 8px 25px; width: 130px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 14px; color: white; text-transform: uppercase; z-index: 100; transition: all 0.3s; }
        #btn-ajuda { background: #1a2a44; border: 1px solid #00f0ff; top: 79%; left: 15%; }
        #btn-reiniciar { background: #cc0000; top: 87%; left: 15%; }
        #placa-concluido { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 500px; background: linear-gradient(145deg, #2c2c2c, #1a1a1a); border: 4px solid #333; border-radius: 15px; z-index: 110; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; box-shadow: 0 0 50px rgba(0,0,0,0.8); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; }
        #placa-concluido.show { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .texto-concluido { color: #00ff00; font-size: 3em; font-weight: bold; text-shadow: 0 0 20px rgba(0, 255, 0, 0.6); z-index: 2; letter-spacing: 2px; }
        .ponto { position: absolute; width: 14px; height: 14px; border: 2px solid #ffffff; border-radius: 50%; cursor: pointer; display: none; z-index: 40; transform: translate(-50%, -50%); animation: pulsar 1.2s infinite; }
        @keyframes pulsar { 0% { transform: translate(-50%, -50%) scale(1); } 70% { transform: translate(-50%, -50%) scale(1.25); } 100% { transform: translate(-50%, -50%) scale(1); } }
        /* [FIM DO SEU CSS ORIGINAL] */

        /* INSERÇÃO: CSS DAS ÁREAS SENSÍVEIS */
        #tooltip-lab { position: fixed; padding: 8px 12px; background: rgba(0, 20, 40, 0.95); color: #00f0ff; border: 1px solid #00f0ff; border-radius: 4px; font-family: 'Orbitron'; font-size: 11px; z-index: 9999; display: none; pointer-events: none; }
        .hotspot { position: absolute; z-index: 80; cursor: help; border: 1px solid red; } /* Borda para ajuste */
    </style>
</head>
<body onclick="fecharBalao()">

    <div id="tooltip-lab"></div>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 1<br>LÂMPADA</h1>
            <h2 class="subtitulo-entrada">CIRCUITO MONOFÁSICO - 127V</h2>
            <div class="creditos-entrada">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</div>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
         
        <div class="hotspot" style="top: 10%; left: 5%; width: 40px; height: 180px;" onmousemove="mapaMouse(event, 'BARRA DE ATERRAMENTO')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 11%; width: 40px; height: 150px;" onmousemove="mapaMouse(event, 'DG (DISJUNTOR GERAL)')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 16%; width: 35px; height: 150px;" onmousemove="mapaMouse(event, 'DPS')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 20%; width: 80px; height: 150px;" onmousemove="mapaMouse(event, 'DR (DISPOSITIVO DR)')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 28%; width: 100px; height: 150px;" onmousemove="mapaMouse(event, 'DISJUNTORES DE CIRCUITO')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 10%; left: 42%; width: 40px; height: 180px;" onmousemove="mapaMouse(event, 'BARRA DE NEUTRO')" onmouseout="mapaSair()"></div>

        <div id="camada-fase1" class="camada-cabo" style="background-image: url('fase1.png');"></div>
        <div id="camada-fase2" class="camada-cabo" style="background-image: url('fase2.png');"></div>
        <div id="camada-retorno1" class="camada-cabo" style="background-image: url('retorno1.png');"></div>
        <div id="camada-retorno2" class="camada-cabo" style="background-image: url('retorno2.png');"></div>
        <div id="camada-neutro1" class="camada-cabo" style="background-image: url('neutro1.png');"></div>
        <div id="camada-neutro2" class="camada-cabo" style="background-image: url('neutro2.png');"></div>

        <div id="balao-ajuda" class="balao-base"><span id="texto-ajuda"></span><span class="referencia-nbr">NBR-5410</span></div>

        <img src="lamp_on.png" id="camada-lampada">
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <img src="con_wago.png" id="wago-fase" class="conector" style="width: 65px; top: 26%; left: 57.4%;" onclick="abrirAjuda(event, 'Cabo Fase: Preto ou Marrom.')">
        <img src="con_wago.png" id="wago-retorno" class="conector" style="width: 65px; top: 17.7%; left: 59.6%;" onclick="abrirAjuda(event, 'Cabo Retorno: Branco ou Vermelho.')">
        <img src="con_wago.png" id="wago-neutro" class="conector" style="width: 65px; top: 14%; left: 57%;" onclick="abrirAjuda(event, 'Cabo Neutro: Azul Claro.')">

        <div id="painel-equipamentos">
            <div class="titulo-painel-equip">STATUS DO CIRCUITO</div>
            <div class="item-equip-moldura"><span>DG</span><span id="status-dg-painel" class="simbolo-desligado">✘</span></div>
            <div class="item-equip-moldura"><span>DR</span><span id="status-dr-painel" class="simbolo-desligado">✘</span></div>
            <div class="item-equip-moldura"><span>INT</span><span id="status-int-painel" class="simbolo-desligado">✘</span></div>
        </div>

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>

        <div id="placa-concluido"><div class="texto-concluido">✓ CONCLUÍDO</div></div>

        <button id="btn-ajuda" class="btn-acao" onclick="event.stopPropagation(); alert('Clique nos conectores para ajuda técnica.')">AJUDA</button>
        <button id="btn-reiniciar" class="btn-acao" onclick="location.reload()">REINICIAR</button>
    </div>

<script>
    /* [INÍCIO DA SUA LÓGICA ORIGINAL] */
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let etapaAtual = 0;
    let primeiroTesteFeito = false;
    let placaJaExibida = false;

    function abrirAjuda(e, t) { e.stopPropagation(); const b = document.getElementById('balao-ajuda'); b.style.display='flex'; b.style.left=(e.pageX-100)+'px'; b.style.top=(e.pageY-110)+'px'; document.getElementById('texto-ajuda').innerText=t; }
    function fecharBalao() { document.getElementById('balao-ajuda').style.display='none'; }

    function iniciarLaboratorio() { document.getElementById('tela-entrada').style.opacity = '0'; setTimeout(() => { document.getElementById('tela-entrada').style.visibility = 'hidden'; carregarEtapa(); }, 500); }

    const sequencia = [
        { id: 'fase1', msg: 'CONECTE A FASE NA ENTRADA DO DG', ini: {t:'38%', l:'27%'}, fim: {t:'23%', l:'56.5%'} },
        { id: 'fase2', msg: 'CONECTE A SAÍDA DO DR AO INTERRUPTOR', ini: {t:'28%', l:'28%'}, fim: {t:'70%', l:'70%'} },
        { id: 'retorno1', msg: 'CONECTE O RETORNO DO INTERRUPTOR AO WAGO', ini: {t:'73%', l:'75%'}, fim: {t:'18%', l:'60%'} },
        { id: 'retorno2', msg: 'LEVE O RETORNO DO WAGO ATÉ A LÂMPADA', ini: {t:'18%', l:'61%'}, fim: {t:'48%', l:'78%'} },
        { id: 'neutro1', msg: 'CONECTE O NEUTRO DA REDE AO BARRAMENTO', ini: {t:'35%', l:'44%'}, fim: {t:'14%', l:'56%'} },
        { id: 'neutro2', msg: 'CONECTE O NEUTRO DO BARRAMENTO À LÂMPADA', ini: {t:'14%', l:'58%'}, fim: {t:'48%', l:'82%'} }
    ];

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) { instalacaoConcluida = true; document.getElementById('status-mensagem').innerHTML = "PRONTO PARA TESTE! LIGUE OS DISPOSITIVOS."; document.getElementById('painel-equipamentos').style.display = 'flex'; return; }
        const d = sequencia[etapaAtual];
        document.getElementById('status-mensagem').innerHTML = d.msg;
        const p1 = document.getElementById('ponto-inicio'); const p2 = document.getElementById('ponto-fim');
        p1.style.top=d.ini.t; p1.style.left=d.ini.l; p1.style.display='block';
        p2.style.top=d.fim.t; p2.style.left=d.fim.l; p2.style.display='block'; p2.style.opacity='0';
        p1.onclick = () => p2.style.opacity='1';
        p2.onclick = () => {
            document.getElementById('camada-'+d.id).style.opacity='1';
            if(d.id.includes('fase')) document.getElementById('wago-fase').style.display='block';
            if(d.id.includes('retorno')) document.getElementById('wago-retorno').style.display='block';
            if(d.id.includes('neutro')) document.getElementById('wago-neutro').style.display='block';
            etapaAtual++; p1.style.display='none'; p2.style.display='none'; carregarEtapa();
        };
    }

    function toggleDispositivo(t) {
        estados[t] = !estados[t];
        const el = document.getElementById('tecla-'+t);
        if(t === 'int') el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        else el.src = estados[t] ? `al_${t}_on.png` : `al_${t}_off.png`;
        atualizarPainel(); verificarCircuito();
    }

    function atualizarPainel() { if (!instalacaoConcluida) return; ['dg', 'dr', 'int'].forEach(t => { const span = document.getElementById(`status-${t}-painel`); span.innerHTML = estados[t] ? '✔' : '✘'; span.className = estados[t] ? 'simbolo-ligado' : 'simbolo-desligado'; }); }

    function verificarCircuito() {
        const lamp = document.getElementById('camada-lampada');
        const ligada = instalacaoConcluida && estados.dg && estados.dr && estados.int;
        if (ligada) { lamp.style.opacity = "1"; primeiroTesteFeito = true; document.getElementById('status-mensagem').innerHTML = 'CIRCUITO LIGADO!'; }
        else { lamp.style.opacity = "0"; if (instalacaoConcluida) document.getElementById('status-mensagem').innerHTML = 'CIRCUITO DESLIGADO.'; if (primeiroTesteFeito && !placaJaExibida && !estados.dg && !estados.dr && !estados.int) { placaJaExibida = true; document.getElementById('placa-concluido').classList.add('show'); setTimeout(() => document.getElementById('placa-concluido').classList.remove('show'), 4000); } }
    }
    /* [FIM DA SUA LÓGICA ORIGINAL] */

    // INSERÇÃO: FUNÇÕES TOOLTIP
    const tt = document.getElementById('tooltip-lab');
    function mapaMouse(e, n) { tt.innerHTML=n; tt.style.display='block'; tt.style.left=e.clientX+'px'; tt.style.top=e.clientY+'px'; }
    function mapaSair() { tt.style.display='none'; }
</script>
</body>
</html>
