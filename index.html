<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Versão Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #060b13; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- TOOLTIP DINÂMICO --- */
        #tooltip-lab {
            position: fixed;
            padding: 8px 12px;
            background: rgba(0, 20, 40, 0.95);
            color: #00f0ff;
            border: 1px solid #00f0ff;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            z-index: 9999;
            display: none;
            white-space: nowrap;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transform: translate(15px, 15px);
        }

        /* --- ÁREAS SENSÍVEIS (HOTSPOTS) --- */
        .hotspot {
            position: absolute;
            z-index: 80;
            cursor: help;
            border: 1px solid red; /* Remova para tornar invisível */
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #060b13; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .moldura-entrada {
            width: 80%; max-width: 900px; height: 70%; max-height: 450px;
            border: 3px solid #00f0ff; border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .intro-entrada {
            color: #008b8b; font-size: 55px; font-weight: 400; line-height: 1.1;
            letter-spacing: 1px; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 139, 139, 0.5); margin: 0 0 10px 0;
        }

        .titulo-entrada {
            color: #00f0ff; font-size: 38px; font-weight: 400; line-height: 1.2;
            letter-spacing: 1px; text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin: 0 0 25px 0;
        }

        .subtitulo-entrada {
            color: #00f0ff; font-size: 24px; font-weight: 450; letter-spacing: 5px;
            text-transform: uppercase; margin: 0 0 50px 0;
        }

        .creditos-entrada { color: #445566; font-size: 15px; font-weight: 500; margin-bottom: 50px; }

        .btn-iniciar-lab {
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px;
            color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase;
            padding: 12px 35px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); transition: all 0.3s ease;
            animation: pulsarBotao 1.5s infinite;
        }
        @keyframes pulsarBotao { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .btn-iniciar-lab:hover { background: #00f0ff; color: #060b13; }

        /* --- INTERFACE --- */
        #painel-status {
            width: 90%; max-width: 950px;
            background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44;
            border-radius: 15px; padding: 25px; margin-bottom: 30px;
            text-align: center; min-height: 80px; display: flex;
            justify-content: center; align-items: center;
        }

        #status-mensagem { 
            font-family: 'Arial Narrow', Arial, sans-serif; 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #ffffff; 
            text-transform: uppercase; 
        }

        #container-simulador { position: relative; line-height: 0; user-select: none; border-radius: 10px; overflow: hidden; display: inline-block; }
        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: 100% 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        #camada-lampada { position: absolute; z-index: 30; opacity: 0; transition: opacity 0.2s; top: 46.5%; left: 75.8%; width: 242px; }

        .tecla { position: absolute; cursor: pointer; z-index: 90; }
        .conector { position: absolute; display: none; z-index: 15; }

        #painel-equipamentos {
            position: absolute; top: 22%; left: 66.3%; width: 190px;
            background: rgba(5, 10, 20, 0.95); border: 2px solid #00f0ff;
            border-radius: 12px; padding: 15px; z-index: 95; display: none; flex-direction: column; gap: 10px;
        }
        .titulo-painel-equip { font-size: 11px; color: #00f0ff; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(0, 240, 255, 0.3); padding-bottom: 6px; }
        .item-equip-moldura { background: rgba(0, 255, 255, 0.05); border: 1px solid #00f0ff; border-radius: 5px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; }
        .simbolo-ligado { color: #00ff00; }
        .simbolo-desligado { color: #ff0000; }

        #placa-concluido {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 500px; background: #1a1a1a; border: 4px solid #333; border-radius: 15px; z-index: 110; 
            display: none; flex-direction: column; align-items: center; padding: 60px 40px; opacity: 0; transition: all 0.5s ease;
        }
        #placa-concluido.show { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .texto-concluido { color: #00ff00; font-size: 3em; font-weight: bold; letter-spacing: 2px; }

        .ponto { position: absolute; width: 14px; height: 14px; border: 2px solid #ffffff; border-radius: 50%; cursor: pointer; display: none; z-index: 40; transform: translate(-50%, -50%); animation: pulsar 1.2s infinite; }
        @keyframes pulsar { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
        
        .btn-acao { position: absolute; padding: 8px 25px; width: 130px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; z-index: 100; }
        #btn-ajuda { background: #1a2a44; border: 1px solid #00f0ff; top: 79%; left: 15%; }
        #btn-reiniciar { background: #cc0000; top: 87%; left: 15%; }
    </style>
</head>
<body>

    <div id="tooltip-lab"></div>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 1<br>LÂMPADA</h1>
            <h2 class="subtitulo-entrada">CIRCUITO MONOFÁSICO - 127V</h2>
            <div class="creditos-entrada">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</div>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
         
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <div class="hotspot" style="top: 9.5%; left: 5.5%; width: 40px; height: 200px;" onmousemove="mapaMouse(event, 'BARRA DE ATERRAMENTO (PE)')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 9.58%; left: 42%; width: 40px; height: 200px;" onmousemove="mapaMouse(event, 'BARRA DE NEUTRO')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 11.5%; width: 40px; height: 156px;" onmousemove="mapaMouse(event, 'DISJUNTOR GERAL (DG)')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 16%; width: 35px; height: 156px;" onmousemove="mapaMouse(event, 'DISPOSITIVO DPS')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 19.8%; width: 85px; height: 163px;" onmousemove="mapaMouse(event, 'DISPOSITIVO DR')" onmouseout="mapaSair()"></div>
        <div class="hotspot" style="top: 12%; left: 28%; width: 118px; height: 163px;" onmousemove="mapaMouse(event, 'DISJUNTORES DE CIRCUITO')" onmouseout="mapaSair()"></div>

        <img src="lamp_on.png" id="camada-lampada">
        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggleDispositivo('int')">

        <img src="con_wago.png" id="wago-fase" class="conector" style="width: 65px; top: 26%; left: 57.4%;">
        <img src="con_wago.png" id="wago-retorno" class="conector" style="width: 65px; top: 17.7%; left: 59.6%;">
        <img src="con_wago.png" id="wago-neutro" class="conector" style="width: 65px; top: 14%; left: 57%;">

        <div id="painel-equipamentos">
            <div class="titulo-painel-equip">STATUS DO CIRCUITO</div>
            <div class="item-equip-moldura"><span>DG</span><span id="status-dg-painel" class="simbolo-desligado">✘</span></div>
            <div class="item-equip-moldura"><span>DR</span><span id="status-dr-painel" class="simbolo-desligado">✘</span></div>
            <div class="item-equip-moldura"><span>INT</span><span id="status-int-painel" class="simbolo-desligado">✘</span></div>
        </div>

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>

        <div id="placa-concluido">
            <div class="texto-concluido">✓ CONCLUÍDO</div>
        </div>

        <button id="btn-ajuda" class="btn-acao" onclick="alert('Consulte os esquemas técnicos no menu de ajuda.')">AJUDA</button>
        <button id="btn-reiniciar" class="btn-acao" onclick="location.reload()">REINICIAR</button>
    </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let primeiroTesteFeito = false; 
    let placaJaExibida = false; 
    let etapaAtual = 0;

    const ttLab = document.getElementById('tooltip-lab');

    function mapaMouse(e, nome) {
        ttLab.innerHTML = nome;
        ttLab.style.display = 'block';
        ttLab.style.left = e.clientX + 'px';
        ttLab.style.top = e.clientY + 'px';
    }

    function mapaSair() { ttLab.style.display = 'none'; }

    function iniciarLaboratorio() { 
        document.getElementById('tela-entrada').style.opacity = '0'; 
        setTimeout(() => { 
            document.getElementById('tela-entrada').style.visibility = 'hidden'; 
            carregarEtapa(); 
        }, 500); 
    }

    // --- SEQUÊNCIA DE MENSAGENS RESTAURADA ---
    const sequencia = [
        { msg: 'CONECTE O CABO DE FASE (PRETO) NA ENTRADA DO DISJUNTOR GERAL (DG)', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'} },
        { msg: 'AGORA CONECTE O CABO NEUTRO (AZUL) NO BARRAMENTO DE NEUTRO', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'} }
        // Se houver mais etapas, basta adicionar aqui mantendo o padrão msg, ini, fim.
    ];

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            document.getElementById('status-mensagem').innerHTML = 'CIRCUITO PRONTO PARA TESTE! LIGUE OS DISPOSITIVOS.';
            document.getElementById('painel-equipamentos').style.display = 'flex';
            return;
        }
        const dados = sequencia[etapaAtual];
        document.getElementById('status-mensagem').innerHTML = dados.msg;
        const p1 = document.getElementById('ponto-inicio');
        const p2 = document.getElementById('ponto-fim');
        
        p1.style.top = dados.ini.t; p1.style.left = dados.ini.l; p1.style.display = 'block';
        p2.style.top = dados.fim.t; p2.style.left = dados.fim.l; p2.style.display = 'block'; p2.style.opacity = '0';

        p1.onclick = () => { p2.style.opacity = '1'; };
        p2.onclick = () => { 
            etapaAtual++; 
            p1.style.display = 'none'; p2.style.display = 'none';
            carregarEtapa(); 
        };
    }

    function toggleDispositivo(tipo) {
        estados[tipo] = !estados[tipo];
        const el = document.getElementById(`tecla-${tipo}`);
        if (tipo === 'dg') el.src = estados.dg ? 'al_dg_on.png' : 'al_dg_off.png';
        if (tipo === 'dr') el.src = estados.dr ? 'al_dr_on.png' : 'al_dr_off.png';
        if (tipo === 'int') el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        
        atualizarPainel();
        verificarCircuito();
    }

    function atualizarPainel() {
        if (!instalacaoConcluida) return;
        ['dg', 'dr', 'int'].forEach(t => {
            const span = document.getElementById(`status-${t}-painel`);
            span.innerHTML = estados[t] ? '✔' : '✘';
            span.className = estados[t] ? 'simbolo-ligado' : 'simbolo-desligado';
        });
    }

    function verificarCircuito() {
        const lamp = document.getElementById('camada-lampada');
        const placa = document.getElementById('placa-concluido');
        const tudoLigado = instalacaoConcluida && estados.dg && estados.dr && estados.int;

        if (tudoLigado) {
            lamp.style.opacity = "1";
            primeiroTesteFeito = true;
            document.getElementById('status-mensagem').innerHTML = 'CIRCUITO EM FUNCIONAMENTO!';
        } else {
            lamp.style.opacity = "0";
            if (instalacaoConcluida) document.getElementById('status-mensagem').innerHTML = 'CIRCUITO DESLIGADO.';
            
            if (primeiroTesteFeito && !placaJaExibida && !estados.dg && !estados.dr && !estados.int) {
                placaJaExibida = true;
                placa.classList.add('show');
                setTimeout(() => placa.classList.remove('show'), 4000);
            }
        }
    }
</script>
</body>
</html>
