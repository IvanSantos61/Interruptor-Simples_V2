<!-- Adicione este botão acima do container-simulador ou onde preferir -->
<div style="margin-bottom: 10px;">
    <button onclick="reiniciarSimulador()" style="padding: 10px 20px; cursor: pointer; background: #cc0000; color: white; border: none; border-radius: 5px; font-weight: bold;">
        🔄 REINICIAR SIMULAÇÃO
    </button>
</div>

<div id="status">
    <div id="status-titulo">Iniciando...</div>
    <div id="status-mensagem" style="font-weight: normal; font-size: 0.9em; margin-top: 5px; color: #ccc;"></div>
</div>

<!-- ... (resto do seu HTML anterior) ... -->

<script>
    // No seu objeto sequencia, quando você enviar as frases, elas entrarão aqui:
    const sequencia = [
        { id: 'FASE1', max: 54, pasta: 'FASE1', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'}, msg: "Aguardando sua frase para FASE1..." },
        { id: 'FASE2', max: 18, pasta: 'FASE2', ini: {t: '23%', l: '58%'}, fim: {t: '81%', l: '68%'}, wagoTop: '25%', wagoLeft: '57.4%', wagoRot: '90deg', msg: "Aguardando sua frase para FASE2..." },
        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t: '20%', l: '61%'}, fim: {t: '75%', l: '68%'}, msg: "Aguardando sua frase para RETORNO1..." },
        { id: 'RETORNO2', max: 24, pasta: 'RETORNO2', ini: {t: '17%', l: '61%'}, fim: {t: '55%', l: '89%'}, wagoTop: '18%', wagoLeft: '60%', wagoRot: '0deg', msg: "Aguardando sua frase para RETORNO2..." },
        { id: 'NEUTRO1', max: 78, pasta: 'NEUTRO1', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'}, msg: "Aguardando sua frase para NEUTRO1..." },
        { id: 'NEUTRO2', max: 30, pasta: 'NEUTRO2', ini: {t: '13%', l: '58%'}, fim: {t: '55%', l: '91.3%'}, wagoTop: '14.5%', wagoLeft: '57%', wagoRot: '270deg', msg: "Aguardando sua frase para NEUTRO2..." }
    ];

    // Atualize a função carregarEtapa para exibir a mensagem:
    function carregarEtapa() {
        const titulo = document.getElementById('status-titulo');
        const mensagem = document.getElementById('status-mensagem');

        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            titulo.innerText = "✅ FIAÇÃO CONCLUÍDA!";
            mensagem.innerText = "Teste o funcionamento ligando o DG, DR e o Interruptor.";
            atualizarCircuito();
            elInicio.style.display = 'none';
            elFim.style.display = 'none';
            return;
        }

        const dados = sequencia[etapaAtual];
        titulo.innerText = `Conecte o cabo: ${dados.id}`;
        mensagem.innerText = dados.msg; // Exibe a frase personalizada

        elInicio.style.top = dados.ini.t;
        elInicio.style.left = dados.ini.l;
        elInicio.style.display = 'block';
        elInicio.style.background = "rgba(255, 255, 0, 0.7)";
        elFim.style.top = dados.fim.t;
        elFim.style.left = dados.fim.l;
        elFim.style.display = 'none';
        aguardandoDestino = false;
    }

    // Função para Reiniciar
    function reiniciarSimulador() {
        // 1. Resetar variáveis
        etapaAtual = 0;
        instalacaoConcluida = false;
        estados = { dg: false, dr: false, int: false };

        // 2. Resetar Imagens dos Dispositivos
        document.getElementById('tecla-dg').src = 'al_dg_off.png';
        document.getElementById('tecla-dr').src = 'al_dr_off.png';
        document.getElementById('tecla-int').src = 'tec_int_off.png';

        // 3. Esconder cabos e conectores
        sequencia.forEach(c => {
            const camada = document.getElementById(`camada-${c.id.toLowerCase()}`);
            camada.style.opacity = "0";
            camada.style.backgroundImage = "none";
        });

        document.getElementById('wago-fase').style.display = 'none';
        document.getElementById('wago-retorno').style.display = 'none';
        document.getElementById('wago-neutro').style.display = 'none';
        document.getElementById('camada-lampada').style.opacity = "0";

        // 4. Recomeçar
        carregarEtapa();
    }
</script>
