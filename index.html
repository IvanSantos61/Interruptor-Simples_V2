<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #050a14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* TELA DE SPLASH */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050a14;
            display: flex; justify-content: center; align-items: center;
            z-index: 500; cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-container {
            width: 80%; max-width: 800px;
            background: linear-gradient(145deg, #0a1528, #050a14);
            border: 3px solid #00ffff; border-radius: 20px;
            padding: 60px 40px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
        }

        /* BALÃO INFORMATIVO (Mantido Original) */
        .balao-informativo {
            position: absolute;
            background: white;
            border-radius: 12px;
            padding: 12px 15px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 300;
            display: none;
            pointer-events: auto;
            max-width: 170px;
            line-height: 1.4;
            cursor: pointer;
        }

        .balao-informativo::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%; margin-left: -10px;
            border-width: 10px; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .item-norma { color: #ff0000; display: block; font-size: 12px; margin-top: 5px; }

        /* TELA DE AJUDA ORIGINAL (MODAL) */
        #tela-ajuda-original {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #foto-ajuda {
            max-width: 90%;
            max-height: 85%;
            border: 3px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        /* PAINEL DE STATUS */
        #painel-status {
            width: 90%; max-width: 950px;
            background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44;
            border-radius: 15px; padding: 25px; margin-bottom: 30px;
            text-align: center; min-height: 80px;
            display: flex; justify-content: center; align-items: center;
        }

        #status-mensagem { font-size: 1.3em; font-weight: bold; color: #ffffff; text-transform: uppercase; }
        .cor-alerta { color: #ff0000 !important; }
        .destaque { color: #ff9900; }

        #container-simulador {
            position: relative; line-height: 0; user-select: none;
            border-radius: 10px; overflow: hidden; display: inline-block;
        }

        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%; pointer-events: none; z-index: 5;
            opacity: 0; transition: opacity 0.3s;
        }

        #camada-lampada { 
            position: absolute; z-index: 30; opacity: 0; 
            top: 46.5%; left: 75.8%; width: 242px;
        }

        .tecla { position: absolute; cursor: pointer; z-index: 25; }
        .conector { position: absolute; width: 72px; display: none; z-index: 15; transform-origin: center; }

        .controles-inferiores {
            position: absolute; bottom: 30px; left: 30px;
            display: flex; gap: 15px; z-index: 100;
        }

        .btn-acao {
            padding: 10px 25px; border: none; border-radius: 20px;
            font-weight: bold; cursor: pointer; font-size: 14px;
            color: white; text-transform: uppercase;
        }

        #btn-reiniciar { background: #cc0000; }
        #btn-ajuda { background: #1a2a44; border: 1px solid #00ffff; }

        .ponto {
            position: absolute; width: 22px; height: 22px;
            background: rgba(255, 255, 0, 0.7); border: 2px solid gold;
            border-radius: 50%; cursor: pointer; display: none; z-index: 40;
            transform: translate(-50%, -50%); animation: pulsar 1.2s infinite;
        }
        @keyframes pulsar { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } }

        #placa-concluido {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 500px; background: #1a1a1a; border: 4px solid #333;
            border-radius: 15px; z-index: 110; display: none;
            flex-direction: column; align-items: center; padding: 60px 40px;
        }
        #placa-concluido.show { display: flex; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body onclick="fecharBalao()">

    <div id="splash-screen" onclick="this.style.opacity='0'; setTimeout(()=>this.style.visibility='hidden', 800)">
        <div class="splash-container">
            <h2 style="color:#00ffff">Interruptor Simples para 1 Lâmpada</h2>
            <p>CLIQUE PARA INICIAR</p>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="tela-ajuda-original" onclick="this.style.display='none'">
        <img id="foto-ajuda" src="">
    </div>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <div id="balao-informativo" class="balao-informativo"></div>
        <img src="lamp_on.png" id="camada-lampada">

        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggle('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggle('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px;" onclick="toggle('int')">

        <img src="con_wago.png" id="wago-fase" class="conector">
        <img src="con_wago.png" id="wago-retorno" class="conector">
        <img src="con_wago.png" id="wago-neutro" class="conector">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto"></div>

        <div id="placa-concluido">
            <h2 style="color:#00ff00">✓ CONCLUÍDO</h2>
        </div>

        <div class="controles-inferiores">
            <button id="btn-reiniciar" class="btn-acao" onclick="location.reload()">REINICIAR</button>
            <button id="btn-ajuda" class="btn-acao" onclick="abrirAjuda(); event.stopPropagation();">AJUDA</button>
        </div>
    </div>

<script>
    let estados = { dg: false, dr: false, int: false };
    let etapaAtual = 0;
    let concluido = false;

    const sequencia = [
        { id: 'FASE1', max: 54, pasta: 'FASE1', ini: {t:'38%', l:'27%'}, fim: {t:'23%', l:'56.5%'}, msg: '<span class="destaque"><span class="cor-alerta">REDE:</span> CONECTE A FASE.</span> CLIQUE NO DR.' },
        { id: 'NEUTRO1', max: 78, pasta: 'NEUTRO1', ini: {t:'35%', l:'44.3%'}, fim: {t:'14%', l:'56%'}, msg: '<span class="destaque"><span class="cor-alerta">REDE:</span> CONECTE O NEUTRO.</span> CLIQUE NO BARRAMENTO.' },
        { id: 'FASE2', max: 18, pasta: 'FASE2', ini: {t:'23%', l:'58%'}, fim: {t:'81%', l:'68%'}, wTop: '25%', wLeft: '57.4%', wRot: '90deg', msg: '<span class="destaque">CONECTE A FASE NO INTERRUPTOR.</span>' },
        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t:'20%', l:'61%'}, fim: {t:'75%', l:'68%'}, msg: '<span class="destaque">CONECTE O RETORNO.</span>' },
        { id: 'RETORNO2', max: 24, pasta: 'RETORNO2', ini: {t:'17%', l:'61%'}, fim: {t:'55%', l:'89%'}, wTop: '17.3%', wLeft: '60%', wRot: '0deg', msg: '<span class="destaque">RETORNO NA LÂMPADA.</span>' },
        { id: 'NEUTRO2', max: 30, pasta: 'NEUTRO2', ini: {t:'13%', l:'58%'}, fim: {t:'55%', l:'91.3%'}, wTop: '14.5%', wLeft: '57%', wRot: '270deg', msg: '<span class="destaque">NEUTRO NA LÂMPADA.</span>' }
    ];

    function abrirAjuda() {
        const tela = document.getElementById('tela-ajuda-original');
        const img = document.getElementById('foto-ajuda');
        // Carrega a foto baseada na etapa
        img.src = (etapaAtual === 0) ? 'bl-fase.png' : (etapaAtual === 1) ? 'bl-neutro.png' : 'bl-fase.png';
        tela.style.display = 'flex';
    }

    function fecharBalao() { document.getElementById('balao-informativo').style.display = 'none'; }

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            concluido = true;
            document.getElementById('status-mensagem').innerHTML = 'TESTE O CIRCUITO!';
            document.getElementById('ponto-inicio').style.display = 'none';
            document.getElementById('ponto-fim').style.display = 'none';
            return;
        }
        const d = sequencia[etapaAtual];
        document.getElementById('status-mensagem').innerHTML = d.msg;
        const pI = document.getElementById('ponto-inicio');
        const pF = document.getElementById('ponto-fim');
        pI.style.top = d.ini.t; pI.style.left = d.ini.l; pI.style.display = 'block';
        pF.style.top = d.fim.t; pF.style.left = d.fim.l; pF.style.display = 'none';
        pI.onclick = (e) => { e.stopPropagation(); pF.style.display = 'block'; };
        pF.onclick = (e) => { e.stopPropagation(); animar(d); };
    }

    function animar(c) {
        let f = 0;
        const cam = document.getElementById(`camada-${c.id.toLowerCase()}`);
        cam.style.opacity = "1";
        const t = setInterval(() => {
            cam.style.backgroundImage = `url('${c.pasta}/quadro${f.toString().padStart(4, '0')}.png')`;
            if (f >= c.max) {
                clearInterval(t);
                if (c.id === 'FASE1') {
                    const b = document.getElementById('balao-informativo');
                    b.innerHTML = 'Seção mínima 1,5 mm².<span class="item-norma">NBR-5410</span>';
                    b.style.top = '79%'; b.style.left = '42%'; b.style.display = 'block';
                }
                if (c.wTop) {
                    const w = document.getElementById(c.id.includes('FASE') ? 'wago-fase' : c.id.includes('RETORNO') ? 'wago-retorno' : 'wago-neutro');
                    w.style.top = c.wTop; w.style.left = c.wLeft; w.style.transform = `translate(-50%,-50%) rotate(${c.wRot})`; w.style.display = 'block';
                }
                etapaAtual++; carregarEtapa();
            }
            f += 6;
        }, 70);
    }

    function toggle(t) {
        estados[t] = !estados[t];
        const e = document.getElementById(`tecla-${t}`);
        if(t==='dg') e.src = estados.dg ? 'al_dg_on.png' : 'al_dg_off.png';
        if(t==='dr') e.src = estados.dr ? 'al_dr_on.png' : 'al_dr_off.png';
        if(t==='int') e.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        
        const L = document.getElementById('camada-lampada');
        if (concluido && estados.dg && estados.dr && estados.int) {
            L.style.opacity = "1";
            document.getElementById('placa-concluido').classList.add('show');
        } else {
            L.style.opacity = "0";
        }
    }

    window.onload = carregarEtapa;
</script>
</body>
</html>
