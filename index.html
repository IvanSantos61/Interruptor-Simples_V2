<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #050a14; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* TELA DE SPLASH ORIGINAL */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050a14;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 500;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-container {
            width: 80%;
            max-width: 800px;
            background: linear-gradient(145deg, #0a1528, #050a14);
            border: 3px solid #00ffff;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .splash-titulo {
            color: #00ffff;
            font-size: 2.8em;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        .splash-sub {
            color: #00ffff;
            font-size: 1.5em;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .splash-divisor {
            width: 150px;
            height: 2px;
            background: #00ffff;
            margin: 30px auto;
            border: none;
            opacity: 0.5;
        }

        .splash-creditos {
            color: #ffffff;
            font-size: 1.1em;
            opacity: 0.8;
            margin-top: 40px;
        }

        .splash-entrar {
            margin-top: 30px;
            font-size: 0.9em;
            color: #00ffff;
            animation: pulsarBotao 1.5s infinite;
        }

        @keyframes pulsarBotao {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* BALÃO DE MENSAGEM COM SETA */
        .balao-instrucao {
            position: absolute;
            background: rgba(5, 10, 20, 0.95);
            border: 2px solid #00ffff;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            z-index: 200;
            pointer-events: none;
            transform: translate(-50%, -125%);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            display: none;
        }

        .balao-instrucao::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: #00ffff transparent transparent transparent;
        }

        /* PAINEL DE STATUS */
        #painel-status {
            width: 90%;
            max-width: 950px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #1a2a44;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #status-mensagem {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cor-alerta { color: #ff0000 !important; }
        .destaque { color: #ff9900; }

        .status-final {
            padding: 12px 40px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .acesa { background: #008000; box-shadow: 0 0 20px #00ff00; border: 1px solid #00ff00; }
        .apagada { background: #cc0000; box-shadow: 0 0 20px #ff0000; border: 1px solid #ff4444; }

        #container-simulador {
            position: relative;
            line-height: 0;
            user-select: none;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
        }

        #fundo { max-width: 1000px; height: auto; display: block; }

        .camada-cabo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%; pointer-events: none; z-index: 5;
            opacity: 0; transition: opacity 0.3s;
        }

        #camada-lampada { 
            position: absolute; z-index: 30; opacity: 0; 
            transition: opacity 0.2s; pointer-events: auto;
            top: 46.5%; left: 75.8%; width: 242px;
        }

        .tecla { position: absolute; cursor: pointer; z-index: 25; transition: transform 0.1s; }
        .conector { 
            position: absolute; width: 72px; display: none; z-index: 15; 
            transform-origin: center; 
        }

        .ponto {
            position: absolute; width: 22px; height: 22px;
            background: rgba(255, 255, 0, 0.7); border: 2px solid gold;
            border-radius: 50%; cursor: pointer; display: none; z-index: 40;
            transform: translate(-50%, -50%); animation: pulsar 1.2s infinite;
        }
        @keyframes pulsar { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="entrarNoLab()">
        <div class="splash-container">
            <div class="splash-titulo">Interruptor Simples para 1 Lâmpada</div>
            <div class="splash-sub">CIRCUITO MONOFÁSICO - 127V</div>
            <hr class="splash-divisor">
            <div class="splash-creditos">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</div>
            <div class="splash-entrar">CLIQUE PARA INICIAR O LABORATÓRIO</div>
        </div>
    </div>

    <h1>LABORATÓRIO SMT PRO</h1>

    <div id="painel-status">
        <div id="status-mensagem">AGUARDANDO INÍCIO...</div>
    </div>

    <div id="container-simulador">
        <img src="ambiente.jpg" id="fundo">
        
        <div id="camada-fase1" class="camada-cabo"></div>
        <div id="camada-fase2" class="camada-cabo"></div>
        <div id="camada-retorno1" class="camada-cabo"></div>
        <div id="camada-retorno2" class="camada-cabo"></div>
        <div id="camada-neutro1" class="camada-cabo"></div>
        <div id="camada-neutro2" class="camada-cabo"></div>

        <img src="lamp_on.png" id="camada-lampada">

        <img src="al_dg_off.png" id="tecla-dg" class="tecla" style="top: 25%; left: 11.4%; width: 50px;" onclick="toggleDispositivo('dg')">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla" style="top: 28%; left: 23.8%; width: 50px;" onclick="toggleDispositivo('dr')">
        <img src="tec_int_off.png" id="tecla-int" class="tecla" style="top: 73%; left: 72%; width: 53px; z-index: 100;" onclick="toggleDispositivo('int')">

        <img src="con_wago.png" id="wago-fase" class="conector">
        <img src="con_wago.png" id="wago-retorno" class="conector">
        <img src="con_wago.png" id="wago-neutro" class="conector">

        <div id="ponto-inicio" class="ponto"></div>
        <div id="ponto-fim" class="ponto">
            <div id="balao-texto" class="balao-instrucao"></div>
        </div>
    </div>

    <audio id="som-disjuntor" src="disj.mp3"></audio>
    <audio id="som-interruptor" src="int.mp3"></audio>
    <audio id="som-conexao" src="conexao.mp3"></audio>

<script>
    let estados = { dg: false, dr: false, int: false };
    let instalacaoConcluida = false;
    let etapaAtual = 0;
    let aguardandoDestino = false;

    const sequencia = [
        { id: 'FASE1', max: 54, pasta: 'FASE1', ini: {t: '38%', l: '27%'}, fim: {t: '23%', l: '56.5%'}, width: '220px', msg: '<span class="destaque"><span class="cor-alerta">REDE:</span> CONECTE A FASE.</span> CLIQUE NA REFERÊNCIA DO DR.', msgDestino: '<span class="destaque"><span class="cor-alerta">REDE:</span> CONECTE A FASE.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM.' },
        { id: 'NEUTRO1', max: 78, pasta: 'NEUTRO1', ini: {t: '35%', l: '44.3%'}, fim: {t: '14%', l: '56%'}, width: '220px', msg: '<span class="destaque"><span class="cor-alerta">REDE:</span> CONECTE O NEUTRO.</span> CLIQUE NA REFERÊNCIA MOSTRADA NO BARRAMENTO (N)', msgDestino: '<span class="destaque"><span class="cor-alerta">REDE:</span> CONECTE O NEUTRO.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM' },
        { id: 'FASE2', max: 18, pasta: 'FASE2', ini: {t: '23%', l: '58%'}, fim: {t: '81%', l: '68%'}, width: '220px', wagoTop: '25%', wagoLeft: '57.4%', wagoRot: '90deg', msg: '<span class="destaque"><span class="cor-alerta">CIRCUITO:</span> CONECTE A FASE.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque"><span class="cor-alerta">CIRCUITO:</span> CONECTE A FASE.</span> CLIQUE NA REFERÊNCIA MOSTRADA NO INTERRUPTOR.' },
        { id: 'RETORNO1', max: 18, pasta: 'RETORNO1', ini: {t: '20%', l: '61%'}, fim: {t: '75%', l: '68%'}, width: '220px', msg: '<span class="destaque"><span class="cor-alerta">CIRCUITO:</span> CONECTE O RETORNO.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque"><span class="cor-alerta">CIRCUITO:</span> CONECTE O RETORNO.</span> CLIQUE NA REFERÊNCIA DO INTERRUPTOR.' },
        { id: 'RETORNO2', max: 24, pasta: 'RETORNO2', ini: {t: '17%', l: '61%'}, fim: {t: '55%', l: '89%'}, width: '220px', wagoTop: '17.3%', wagoLeft: '60%', wagoRot: '0deg', msg: '<span class="destaque"><span class="cor-alerta">CIRCUITO:</span> CONECTE O RETORNO.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque"><span class="cor-alerta">CIRCUITO</span>: CONECTE O RETORNO.</span> CLIQUE NA REFERÊNCIA MOSTRADA NA LÂMPADA.' },
        { id: 'NEUTRO2', max: 30, pasta: 'NEUTRO2', ini: {t: '13%', l: '58%'}, fim: {t: '55%', l: '91.3%'}, width: '220px', wagoTop: '14.5%', wagoLeft: '57%', wagoRot: '270deg', msg: '<span class="destaque"><span class="cor-alerta">CIRCUITO:</span> CONECTE O NEUTRO.</span> CLIQUE NA REFERÊNCIA DENTRO DA CAIXA DE PASSAGEM.', msgDestino: '<span class="destaque"><span class="cor-alerta">CIRCUITO</span>: CONECTE O NEUTRO.</span> CLIQUE NA REFERÊNCIA MOSTRADA NA LÂMPADA' }
    ];

    const elInicio = document.getElementById('ponto-inicio');
    const elFim = document.getElementById('ponto-fim');
    const elBalao = document.getElementById('balao-texto');
    const statusTxt = document.getElementById('status-mensagem');

    function entrarNoLab() { 
        document.getElementById('splash-screen').style.opacity = '0'; 
        setTimeout(() => document.getElementById('splash-screen').style.visibility = 'hidden', 800); 
    }

    function carregarEtapa() {
        if (etapaAtual >= sequencia.length) {
            instalacaoConcluida = true;
            statusTxt.innerHTML = '<span class="destaque">MONTAGEM CONCLUÍDA!</span> LIGUE O DG, O DR E O INTERRUPTOR.';
            elInicio.style.display = 'none'; elFim.style.display = 'none';
            return;
        }
        const dados = sequencia[etapaAtual];
        statusTxt.innerHTML = dados.msg;
        elInicio.style.top = dados.ini.t; elInicio.style.left = dados.ini.l;
        elInicio.style.display = 'block'; 
        elFim.style.top = dados.fim.t; elFim.style.left = dados.fim.l;
        elFim.style.display = 'none';
        elBalao.style.display = 'none';
        aguardandoDestino = false;
    }

    elInicio.onclick = () => { 
        elInicio.style.background = "#00ff00"; 
        elFim.style.display = 'block'; 
        aguardandoDestino = true; 
        const etapa = sequencia[etapaAtual];
        statusTxt.innerHTML = etapa.msgDestino;
        elBalao.style.width = etapa.width;
        elBalao.innerHTML = etapa.msgDestino;
        elBalao.style.display = 'block';
    };

    elFim.onclick = () => { if (aguardandoDestino) animarCabo(sequencia[etapaAtual]); };

    function animarCabo(cabo) {
        let frame = 0;
        const camada = document.getElementById(`camada-${cabo.id.toLowerCase()}`);
        camada.style.opacity = "1";
        elBalao.style.display = 'none';

        const loop = setInterval(() => {
            const frameString = Math.min(frame, cabo.max).toString().padStart(4, '0');
            camada.style.backgroundImage = `url('${cabo.pasta}/quadro${frameString}.png')`;
            if (frame >= cabo.max) {
                clearInterval(loop);
                document.getElementById('som-conexao').play();

                if (cabo.id === 'FASE1') {
                    elBalao.style.width = '250px';
                    elBalao.innerHTML = 'Na iluminação a seção minima é 2,5mm2';
                    elBalao.style.display = 'block';
                }

                if (cabo.wagoTop) {
                    let idWago = cabo.id.toLowerCase().includes('fase') ? 'wago-fase' : cabo.id.toLowerCase().includes('retorno') ? 'wago-retorno' : 'wago-neutro';
                    const wago = document.getElementById(idWago);
                    wago.style.top = cabo.wagoTop; wago.style.left = cabo.wagoLeft;
                    wago.style.transform = `translate(-50%, -50%) rotate(${cabo.wagoRot})`; 
                    wago.style.display = 'block';
                }
                etapaAtual++; setTimeout(carregarEtapa, 1500);
            }
            frame += 6;
        }, 70);
    }

    function toggleDispositivo(tipo) {
        estados[tipo] = !estados[tipo];
        const el = document.getElementById(`tecla-${tipo}`);
        if (tipo === 'int') {
            document.getElementById('som-interruptor').play();
            el.src = estados.int ? 'tec_int_on.png' : 'tec_int_off.png';
        } else {
            document.getElementById('som-disjuntor').play();
            el.src = estados[tipo] ? `al_${tipo}_on.png` : `al_${tipo}_off.png`;
        }
        atualizarCircuito();
    }

    function atualizarCircuito() {
        const lamp = document.getElementById('camada-lampada');
        if (instalacaoConcluida && estados.dg && estados.dr && estados.int) {
            lamp.style.opacity = "1";
            statusTxt.innerHTML = '<div class="status-final acesa">LÂMPADA ACESA</div>';
        } else {
            lamp.style.opacity = "0";
            if (instalacaoConcluida) statusTxt.innerHTML = '<div class="status-final apagada">LÂMPADA APAGADA</div>';
        }
    }
    window.onload = carregarEtapa;
</script>
</body>
</html>
