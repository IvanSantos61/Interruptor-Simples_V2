<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Paleta</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #060b13; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- PAINEL DE STATUS (REVERTIDO PARA ARIAL NARROW E EDITÁVEL) --- */
        #painel-status {
            width: 90%; max-width: 950px;
            background: rgba(0, 0, 0, 0.4); border: 1px solid #1a2a44;
            border-radius: 15px; padding: 25px; margin-bottom: 30px;
            text-align: center; min-height: 80px; display: flex;
            justify-content: center; align-items: center;
            transition: all 0.4s ease; /* Transição suave ao mudar de cor */
        }

        #status-mensagem { 
            font-family: 'Arial Narrow', Arial, sans-serif; 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #ffffff; 
            letter-spacing: 1px;
            text-transform: uppercase; 
        }

        /* --- CONTAINER DO SEU SIMULADOR ORIGINIAL --- */
        #container-simulador { position: relative; line-height: 0; user-select: none; border-radius: 10px; overflow: hidden; display: inline-block; margin-bottom: 40px; }
        #fundo { max-width: 1000px; height: auto; display: block; }

        /* --- SEÇÃO DA LISTA DE CORES ESTILIZADA COMO A AJUDA --- */
        #secao-cores {
            width: 90%; max-width: 500px;
            background: rgba(5, 10, 20, 0.95);
            border: 2px solid #00f0ff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        .cores-titulo { 
            color: #00f0ff; 
            text-align: center; 
            margin-top: 0;
            margin-bottom: 20px; 
            font-weight: bold; 
            font-size: 18px; 
            letter-spacing: 1px; 
            text-transform: uppercase;
        }
        
        /* Molduras idênticas às da ajuda (.ajuda-item) */
        .cor-item-moldura { 
            background: rgba(0, 255, 255, 0.05); 
            border: 1px solid #00f0ff; 
            color: white; 
            padding: 12px; 
            margin-bottom: 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 15px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .cor-item-moldura:hover {
            background: rgba(0, 255, 255, 0.15);
        }

        .cor-item-moldura:last-child {
            margin-bottom: 0;
        }

        /* Pequeno quadrado para mostrar a cor na moldura */
        .preview-cor {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid #ffffff;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>LABORATÓRIO SMT PRO</h1>

    <!-- Seu painel de status padrão -->
    <div id="painel-status">
        <div id="status-mensagem">CLIQUE NAS MOLDURAS ABAIXO PARA TESTAR AS CORES DO PAINEL</div>
    </div>

    <!-- LISTA DE CORES FORMATADA NO PADRÃO DE MOLDURAS DA AJUDA -->
    <div id="secao-cores">
        <div class="cores-titulo">Sugestões de Cores (Clique para Testar)</div>
        
        <div class="cor-item-moldura" onclick="mudarCorPainel('#0b1528', '#00f0ff')">
            <span>1. Azul Profundo Tecnológico</span>
            <div class="preview-cor" style="background: #0b1528; border-color: #00f0ff;"></div>
        </div>

        <div class="cor-item-moldura" onclick="mudarCorPainel('#15191e', '#3a4454')">
            <span>2. Cinza Grafite Industrial</span>
            <div class="preview-cor" style="background: #15191e; border-color: #3a4454;"></div>
        </div>

        <div class="cor-item-moldura" onclick="mudarCorPainel('#000000', 'rgba(0, 240, 255, 0.4)')">
            <span>3. Preto Absoluto</span>
            <div class="preview-cor" style="background: #000000; border-color: rgba(255,255,255,0.3);"></div>
        </div>

        <div class="cor-item-moldura" onclick="mudarCorPainel('#1b2e24', '#00ff66')">
            <span>4. Verde Militar Operacional</span>
            <div class="preview-cor" style="background: #1b2e24; border-color: #00ff66;"></div>
        </div>

        <div class="cor-item-moldura" onclick="mudarCorPainel('#0f1c2e', '#445566')">
            <span>5. Azul Marinho Corporativo</span>
            <div class="preview-cor" style="background: #0f1c2e; border-color: #445566;"></div>
        </div>

        <div class="cor-item-moldura" onclick="mudarCorPainel('rgba(0, 0, 0, 0.4)', '#1a2a44')">
            <span>6. Restaurar Original (Transparente)</span>
            <div class="preview-cor" style="background: rgba(0, 0, 0, 0.4); border-color: #1a2a44;"></div>
        </div>
    </div>

<script>
    // Função para alterar em tempo real o estilo do painel para testes
    function mudarCorPainel(corFundo, corBorda) {
        const painel = document.getElementById('painel-status');
        painel.style.background = corFundo;
        painel.style.borderColor = corBorda;
        
        // Se for o azul profundo ou verde, adiciona um leve brilho extra na caixa
        if (corFundo === '#0b1528' || corFundo === '#1b2e24') {
            painel.style.boxShadow = `0 0 15px ${corBorda}`;
        } else {
            painel.style.boxShadow = 'none';
        }
    }
</script>
</body>
</html>
